<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏀 投籃機</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background:#0d0d1f; overflow:hidden; font-family:'Microsoft JhengHei',sans-serif; }
canvas { display:block; }
#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 24px; pointer-events:none;
}
#score-el { font-size:2.4em; font-weight:900; color:#fff; text-shadow:0 0 16px #ff8c00; }
#timer-el { font-size:2.4em; font-weight:900; color:#00e5ff; text-shadow:0 0 16px #00e5ff; }
#timer-el.urgent { color:#ff4444 !important; text-shadow:0 0 16px #ff4444 !important; animation:blink .45s infinite alternate; }
@keyframes blink { to { opacity:.4; } }
#combo-el {
  position:fixed; top:74px; left:50%; transform:translateX(-50%);
  font-size:1.3em; font-weight:900; color:#ffd700;
  text-shadow:0 0 12px #ffd700; pointer-events:none; opacity:0;
}
#popup-el {
  position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);
  font-size:clamp(2em,10vw,5em); font-weight:900; pointer-events:none;
  text-shadow:0 0 30px currentColor; opacity:0; white-space:nowrap;
}
#hint-el {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,.45); font-size:.9em;
  pointer-events:none; text-align:center; line-height:1.7;
}
#gameover-el {
  position:fixed; inset:0; background:rgba(0,0,0,.88);
  flex-direction:column; align-items:center; justify-content:center;
  color:#fff; display:none;
}
#gameover-el h2 { font-size:2em; color:#ffd700; text-shadow:0 0 20px #ffd700; margin-bottom:6px; }
#final-score-el { font-size:4.5em; font-weight:900; color:#ff8c00; text-shadow:0 0 24px #ff8c00; }
#final-rate-el { margin-top:8px; font-size:1em; opacity:.6; }
#replay-btn {
  margin-top:32px; padding:16px 54px; font-size:1.2em; font-weight:700;
  background:linear-gradient(135deg,#ff6200,#ff9500); color:#fff;
  border:none; border-radius:50px; cursor:pointer;
  font-family:'Microsoft JhengHei',sans-serif;
  box-shadow:0 4px 24px rgba(255,98,0,.5);
}
</style>
</head>
<body>
<div id="hud">
  <div id="score-el">0</div>
  <div id="timer-el">60</div>
</div>
<div id="combo-el"></div>
<div id="popup-el"></div>
<div id="hint-el">向上滑動投籃<br>左右調整方向</div>
<div id="gameover-el">
  <h2>時間到！</h2>
  <div id="final-score-el"></div>
  <div id="final-rate-el"></div>
  <button id="replay-btn">再玩一次</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const GRAVITY=-16, HOOP_Z=0, HOOP_Y=3.05, RIM_R=0.46, BALL_R=0.24;
let ballHome=new THREE.Vector3(0,1.05,2.8);

// ── Renderer ──
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

// ── Scene / Camera ──
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d0d1f);
scene.fog=new THREE.Fog(0x0d0d1f,14,26);
const camera=new THREE.PerspectiveCamera(58,W()/H(),.1,40);
camera.position.set(0,1.9,5.5);
camera.lookAt(0,3.3,0);

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffffff,.5));
const sun=new THREE.DirectionalLight(0xfff0e0,1.4);
sun.position.set(3,10,6); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
const blueLight=new THREE.PointLight(0x4466ff,.6,20);
blueLight.position.set(-4,6,4); scene.add(blueLight);
const rimLight=new THREE.PointLight(0xff5500,.9,8);
rimLight.position.set(0,3.8,1.5); scene.add(rimLight);

// ── Floor ──
const floor=new THREE.Mesh(
  new THREE.PlaneGeometry(12,14),
  new THREE.MeshStandardMaterial({color:0x7a3b10,roughness:.9})
);
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);

// free-throw line
const lm=new THREE.LineBasicMaterial({color:0xffe082,opacity:.45,transparent:true});
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
  [new THREE.Vector3(-4,.01,4.5),new THREE.Vector3(4,.01,4.5)]),lm));

// ── Back wall ──
const wall=new THREE.Mesh(
  new THREE.PlaneGeometry(10,7),
  new THREE.MeshStandardMaterial({color:0x12122e,roughness:.85})
);
wall.position.set(0,3.5,-2.5); scene.add(wall);

// ── Hoop assembly ──
const metal=new THREE.MeshStandardMaterial({color:0xc0c0c0,metalness:.9,roughness:.15});

const bbMesh=new THREE.Mesh(
  new THREE.BoxGeometry(1.83,1.07,.06),
  new THREE.MeshStandardMaterial({color:0xd0eaff,transparent:true,opacity:.82,roughness:.05})
);
bbMesh.position.set(0,HOOP_Y+.48,HOOP_Z-.8);
bbMesh.castShadow=true; scene.add(bbMesh);

const sqMesh=new THREE.Mesh(
  new THREE.BoxGeometry(.59,.45,.04),
  new THREE.MeshStandardMaterial({color:0xff4400,transparent:true,opacity:.55})
);
sqMesh.position.set(0,HOOP_Y+.42,HOOP_Z-.77); scene.add(sqMesh);

const armMesh=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,.9,8),metal);
armMesh.rotation.set(Math.PI/2,0,0);
armMesh.position.set(0,HOOP_Y+.04,HOOP_Z-.35); scene.add(armMesh);

const rimMesh=new THREE.Mesh(
  new THREE.TorusGeometry(RIM_R,.03,12,64),
  new THREE.MeshStandardMaterial({color:0xff5500,metalness:.8,roughness:.2})
);
rimMesh.rotation.x=Math.PI/2;
rimMesh.position.set(0,HOOP_Y,HOOP_Z);
rimMesh.castShadow=true; scene.add(rimMesh);

// net
(function(){
  const segs=12,netH=.44,topR=RIM_R-.02,botR=RIM_R*.28;
  const nm=new THREE.LineBasicMaterial({color:0xffffff,opacity:.5,transparent:true});
  const v=(a,r,y)=>new THREE.Vector3(Math.cos(a)*r,HOOP_Y-y,HOOP_Z+Math.sin(a)*r);
  for(let i=0;i<segs;i++){
    const a=(i/segs)*Math.PI*2, a2=((i+1)/segs)*Math.PI*2;
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v(a,topR,0),v(a,botR,netH)]),nm));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v(a2,topR,0),v(a,botR,netH)]),nm));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      v(a,topR*.65+botR*.35,netH*.45),v(a2,topR*.65+botR*.35,netH*.45)]),nm));
  }
})();

// ── Ball ──
const ball=new THREE.Mesh(
  new THREE.SphereGeometry(BALL_R,32,32),
  new THREE.MeshStandardMaterial({color:0xff6200,roughness:.62,metalness:.06})
);
ball.castShadow=true;
// seams
const seamMat=new THREE.LineBasicMaterial({color:0x2a0800,opacity:.65,transparent:true});
[[1,0,0],[0,1,0],[0,0,1]].forEach((axis,ai)=>{
  const pts=[];
  for(let i=0;i<=48;i++){
    const t=(i/48)*Math.PI*2,c=Math.cos(t)*(BALL_R+.002),s=Math.sin(t)*(BALL_R+.002);
    if(ai===0) pts.push(new THREE.Vector3(0,c,s));
    else if(ai===1) pts.push(new THREE.Vector3(c,0,s));
    else pts.push(new THREE.Vector3(c,s,0));
  }
  ball.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),seamMat));
});
scene.add(ball);

// blob shadow
const blob=new THREE.Mesh(
  new THREE.CircleGeometry(.22,32),
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.45})
);
blob.rotation.x=-Math.PI/2; blob.position.y=.005; scene.add(blob);

// ── Arc preview dots ──
const ARC_N=18;
const arcDots=Array.from({length:ARC_N},(_,i)=>{
  const d=new THREE.Mesh(
    new THREE.SphereGeometry(Math.max(.025,.06-i*.002),6,6),
    new THREE.MeshBasicMaterial({color:0xffeb3b,transparent:true,opacity:Math.max(.08,.85-i*.045)})
  );
  d.visible=false; scene.add(d); return d;
});

function showArc(dx,dy){
  const nUp=-dy/H();
  if(nUp<.025){hideArc();return;}
  const vy0=nUp*36,vz0=-nUp*30,vx0=(dx/H())*22;
  const sdt=.055;
  let px=ballHome.x,py=ballHome.y,pz=ballHome.z,vx=vx0,vy=vy0,vz=vz0;
  arcDots.forEach(d=>{
    vy+=GRAVITY*sdt; px+=vx*sdt; py+=vy*sdt; pz+=vz*sdt;
    if(py<.05||pz<-5){d.visible=false;}
    else{d.position.set(px,py,pz);d.visible=true;}
  });
}
function hideArc(){arcDots.forEach(d=>d.visible=false);}

// ── Game state ──
let scored=0,shots=0,streak=0;
let inFlight=false,scoredThisShot=false;
let gameActive=false,timeLeft=60;
let vel=new THREE.Vector3();
let popTimer=0,comboTimer=0,resetTimer=0,awaitReset=false;
let drag=false,dsx=0,dsy=0;

const scoreEl=document.getElementById('score-el');
const timerEl=document.getElementById('timer-el');
const comboEl=document.getElementById('combo-el');
const popupEl=document.getElementById('popup-el');
const hintEl=document.getElementById('hint-el');
const gameoverEl=document.getElementById('gameover-el');
document.getElementById('replay-btn').addEventListener('click',startGame);

function showPopup(txt,col){
  popupEl.textContent=txt; popupEl.style.color=col; popupEl.style.opacity='1'; popTimer=1.0;
}
function flashRim(col){
  rimMesh.material.color.set(col);
  setTimeout(()=>rimMesh.material.color.set(0xff5500),220);
}

// ── Controls ──
function pDown(cx,cy){if(!gameActive||inFlight)return;drag=true;dsx=cx;dsy=cy;}
function pMove(cx,cy){if(drag)showArc(cx-dsx,cy-dsy);}
function pUp(cx,cy){
  if(!drag)return; drag=false; hideArc();
  const dx=cx-dsx,dy=cy-dsy,nUp=-dy/H();
  if(nUp<.025||inFlight||!gameActive)return;
  shots++;
  vel.set((dx/H())*22,nUp*36,-nUp*30);
  ball.position.copy(ballHome);
  inFlight=true; scoredThisShot=false; awaitReset=false;
  hintEl.style.opacity='0';
}
window.addEventListener('mousedown',e=>pDown(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>pMove(e.clientX,e.clientY));
window.addEventListener('mouseup',e=>pUp(e.clientX,e.clientY));
window.addEventListener('touchstart',e=>{e.preventDefault();pDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('touchmove',e=>{e.preventDefault();pMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('touchend',e=>{e.preventDefault();pUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});

// ── Score check ──
function checkScore(){
  const {x:bx,y:by,z:bz}=ball.position;
  if(vel.y<0&&Math.abs(by-HOOP_Y)<.3){
    const hd=Math.sqrt(bx*bx+(bz-HOOP_Z)*(bz-HOOP_Z));
    if(hd<RIM_R-.09&&!scoredThisShot){
      scoredThisShot=true; scored++; streak++;
      scoreEl.textContent=scored;
      flashRim(0x00ff88);
      if(streak>=3){
        showPopup(`🔥 ${streak}連中！`,'#ff9900');
        comboEl.textContent=`🔥 COMBO ×${streak}`;
        comboEl.style.opacity='1'; comboTimer=2.5;
      } else if(streak===2){
        showPopup('NICE! ×2 🔥','#ffd700');
      } else {
        showPopup('NICE! 🏀','#00e5ff');
      }
    }
  }
}

// ── Game flow ──
function startGame(){
  scored=0; shots=0; streak=0;
  inFlight=false; scoredThisShot=false; awaitReset=false;
  timeLeft=60; gameActive=true;
  vel.set(0,0,0);
  ballHome.set(0,1.05,2.8);
  ball.position.copy(ballHome);
  scoreEl.textContent='0';
  timerEl.textContent='60'; timerEl.classList.remove('urgent');
  popupEl.style.opacity='0'; comboEl.style.opacity='0';
  hintEl.style.opacity='.45';
  gameoverEl.style.display='none';
  hideArc();
}
function endGame(){
  gameActive=false;
  const rate=shots>0?Math.round(scored/shots*100):0;
  document.getElementById('final-score-el').textContent=`${scored} 分`;
  document.getElementById('final-rate-el').textContent=`投 ${shots} 球・命中率 ${rate}%`;
  gameoverEl.style.display='flex';
}

// ── Loop ──
const clock=new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),.05);

  if(gameActive){
    timeLeft-=dt;
    const secs=Math.ceil(Math.max(0,timeLeft));
    timerEl.textContent=secs;
    if(secs<=10)timerEl.classList.add('urgent');
    if(timeLeft<=0){timeLeft=0;endGame();}
  }

  if(inFlight){
    vel.y+=GRAVITY*dt;
    ball.position.addScaledVector(vel,dt);
    ball.rotation.x+=vel.z*dt*3.5;
    ball.rotation.z-=vel.x*dt*3.5;
    const bh=ball.position.y;
    blob.position.set(ball.position.x,.005,ball.position.z);
    blob.scale.setScalar(Math.max(.18,1-bh*.1));
    blob.material.opacity=Math.max(.04,.45-bh*.04);
    checkScore();
    if(!awaitReset&&(ball.position.y<-.5||ball.position.z<-6||ball.position.z>7)){
      awaitReset=true; resetTimer=0;
      if(!scoredThisShot){streak=0;comboEl.style.opacity='0';showPopup('MISS','#ff4444');}
    }
    if(awaitReset){
      resetTimer+=dt;
      if(resetTimer>.6){
        inFlight=false; awaitReset=false; scoredThisShot=false;
        vel.set(0,0,0);
        ballHome.x=(Math.random()-.5)*.7;
        ball.position.copy(ballHome);
      }
    }
  } else {
    const t=clock.getElapsedTime();
    ball.position.set(ballHome.x,ballHome.y+Math.sin(t*2.2)*.04,ballHome.z);
    blob.position.set(ballHome.x,.005,ballHome.z);
    blob.scale.setScalar(1); blob.material.opacity=.42;
  }

  if(popTimer>0){popTimer-=dt;popupEl.style.opacity=String(Math.max(0,Math.min(1,popTimer/.25)));}
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboEl.style.opacity='0';}

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

startGame(); tick();
</script>
</body>
</html>
