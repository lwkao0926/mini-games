<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏀 投籃機</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background:#000; overflow:hidden; font-family:'Microsoft JhengHei',sans-serif; }
canvas { display:block; }
#popup {
  position:fixed; top:36%; left:50%; transform:translate(-50%,-50%);
  font-size:clamp(1.8em,9vw,4.5em); font-weight:900; pointer-events:none;
  text-shadow:0 0 24px currentColor; opacity:0; white-space:nowrap;
}
#hint {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,.5); font-size:.88em; pointer-events:none; text-align:center;
}
#gameover {
  position:fixed; inset:0; background:rgba(0,0,0,.88);
  flex-direction:column; align-items:center; justify-content:center;
  color:#fff; display:none;
}
#gameover h2 { font-size:2em; color:#ffd700; text-shadow:0 0 20px #ffd700; margin-bottom:6px; }
#final-score { font-size:4em; font-weight:900; color:#ff6600; text-shadow:0 0 20px #ff6600; }
#final-rate { margin-top:8px; font-size:.95em; opacity:.6; }
#replay-btn {
  margin-top:28px; padding:14px 52px; font-size:1.15em; font-weight:700;
  background:linear-gradient(135deg,#ff6200,#ff9500); color:#fff;
  border:none; border-radius:50px; cursor:pointer;
  font-family:'Microsoft JhengHei',sans-serif;
  box-shadow:0 4px 20px rgba(255,98,0,.5);
}
</style>
</head>
<body>
<div id="popup"></div>
<div id="hint">向上滑動投籃</div>
<div id="gameover">
  <h2>時間到！</h2>
  <div id="final-score"></div>
  <div id="final-rate"></div>
  <button id="replay-btn">再玩一次</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const GRAVITY=-16, HOOP_Z=-1.8, HOOP_Y=3.2, RIM_R=0.46, BALL_R=0.235;
const BALL_HOME=new THREE.Vector3(0,0.42,1.9);

// ── Renderer ──
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x010814);
scene.fog=new THREE.Fog(0x010814,12,22);

// ── Camera (top-down arcade view, responsive FOV) ──
const getFOV=()=> W()<H()?62:50;
const camera=new THREE.PerspectiveCamera(getFOV(),W()/H(),.1,40);
camera.position.set(0,8,6);
camera.lookAt(0,2,-0.5);

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffffff,.4));
const sun=new THREE.DirectionalLight(0xfff0e0,1.1);
sun.position.set(1,8,4); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
const blueL=new THREE.PointLight(0x0055ff,1.2,7);
blueL.position.set(-2.2,3.5,0); scene.add(blueL);
const blueR=new THREE.PointLight(0x0055ff,1.2,7);
blueR.position.set(2.2,3.5,0); scene.add(blueR);
const rimLight=new THREE.PointLight(0xff6600,1.1,5);
rimLight.position.set(0,4.5,-1.2); scene.add(rimLight);

// ── Machine floor (wood) ──
const floor=new THREE.Mesh(
  new THREE.PlaneGeometry(2.8,5.2),
  new THREE.MeshStandardMaterial({color:0xc07535,roughness:.75})
);
floor.rotation.x=-Math.PI/2; floor.position.set(0,0,0);
floor.receiveShadow=true; scene.add(floor);
// floor strips
const flm=new THREE.LineBasicMaterial({color:0x8b5020,opacity:.4,transparent:true});
[-0.7,0,0.7].forEach(x=>scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,.01,-2.4),new THREE.Vector3(x,.01,2.4)]),flm)));

// ── Side walls (blue curtain) ──
const wallMat=new THREE.MeshStandardMaterial({color:0x051550,roughness:.35,metalness:.35});
const wallL=new THREE.Mesh(new THREE.BoxGeometry(.22,5,5.2),wallMat);
wallL.position.set(-1.62,2.5,0); wallL.castShadow=true; scene.add(wallL);
const wallR=new THREE.Mesh(new THREE.BoxGeometry(.22,5,5.2),wallMat);
wallR.position.set(1.62,2.5,0); wallR.castShadow=true; scene.add(wallR);
// Wall highlight strips
const trimMat=new THREE.MeshStandardMaterial({color:0x1144cc,metalness:.7,roughness:.2,emissive:new THREE.Color(0x001166)});
[-1.52,1.52].forEach(x=>{
  const t=new THREE.Mesh(new THREE.BoxGeometry(.03,5,5.2),trimMat);
  t.position.set(x,2.5,0); scene.add(t);
});

// ── Back wall ──
const backWall=new THREE.Mesh(
  new THREE.BoxGeometry(3.0,5.0,.12),
  new THREE.MeshStandardMaterial({color:0x060f28,roughness:.9})
);
backWall.position.set(0,2.5,-2.7); scene.add(backWall);

// ── Top arch ──
const archMat=new THREE.MeshStandardMaterial({color:0x050e28,metalness:.5,roughness:.3});
const archTop=new THREE.Mesh(new THREE.BoxGeometry(3.2,.28,.9),archMat);
archTop.position.set(0,5.1,-1.2); scene.add(archTop);
// LED dots along arch
const ledMat=new THREE.MeshBasicMaterial({color:0x22ccff,transparent:true,opacity:.9});
for(let i=0;i<13;i++){
  const led=new THREE.Mesh(new THREE.SphereGeometry(.055,6,6),ledMat.clone());
  led.position.set(-1.3+(i/12)*2.6,5.05,-1.2);
  scene.add(led);
}

// ── Canvas scoreboard ──
const sbCvs=document.createElement('canvas');
sbCvs.width=512; sbCvs.height=192;
const sbCtx=sbCvs.getContext('2d');
const sbTex=new THREE.CanvasTexture(sbCvs);

const sbMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(2.0,.75),
  new THREE.MeshBasicMaterial({map:sbTex})
);
sbMesh.position.set(0,3.88,-2.64);
sbMesh.rotation.x=-0.12;
scene.add(sbMesh);

function drawBoard(t,sc,hi,active){
  const ctx=sbCtx,w=512,h=192;
  ctx.fillStyle='#000e20'; ctx.fillRect(0,0,w,h);
  // dot matrix background
  ctx.fillStyle='#001830';
  for(let x=0;x<w;x+=5) for(let y=0;y<h;y+=5) ctx.fillRect(x,y,2,2);
  // column dividers
  ctx.strokeStyle='#002244'; ctx.lineWidth=1;
  [170,342].forEach(x=>{ctx.beginPath();ctx.moveTo(x,8);ctx.lineTo(x,h-8);ctx.stroke();});
  // labels
  ctx.fillStyle='#88aacc'; ctx.font='bold 20px monospace'; ctx.textAlign='center';
  ctx.fillText('HIGHEST',85,28); ctx.fillText('TIME',256,28); ctx.fillText('SCORE',427,28);
  // values
  ctx.font='bold 68px monospace';
  ctx.fillStyle='#ff6600'; ctx.fillText(hi.toString().padStart(3,'0'),85,112);
  ctx.fillStyle=t<=10?'#ff2200':'#ff6600';
  ctx.fillText(Math.ceil(Math.max(0,t)).toString().padStart(2,'0'),256,112);
  ctx.fillStyle='#ff6600'; ctx.fillText(sc.toString().padStart(3,'0'),427,112);
  if(!active){ctx.fillStyle='#ffdd00';ctx.font='bold 28px monospace';ctx.fillText('WELCOME',256,170);}
  sbTex.needsUpdate=true;
}

// ── Backboard ──
const metal=new THREE.MeshStandardMaterial({color:0xd0d0d0,metalness:.9,roughness:.15});
const bb=new THREE.Mesh(
  new THREE.BoxGeometry(1.7,.97,.05),
  new THREE.MeshStandardMaterial({color:0xd8eeff,transparent:true,opacity:.75,roughness:.05})
);
bb.position.set(0,HOOP_Y+.52,HOOP_Z-.55); bb.castShadow=true; scene.add(bb);
const sq=new THREE.Mesh(
  new THREE.BoxGeometry(.55,.42,.04),
  new THREE.MeshStandardMaterial({color:0xff4400,transparent:true,opacity:.55})
);
sq.position.set(0,HOOP_Y+.45,HOOP_Z-.53); scene.add(sq);
const arm=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,.65,8),metal);
arm.rotation.set(Math.PI/2,0,0);
arm.position.set(0,HOOP_Y+.04,HOOP_Z-.22); scene.add(arm);

// ── Rim ──
const rimMesh=new THREE.Mesh(
  new THREE.TorusGeometry(RIM_R,.032,12,64),
  new THREE.MeshStandardMaterial({color:0xff5500,metalness:.85,roughness:.15})
);
rimMesh.rotation.x=Math.PI/2;
rimMesh.position.set(0,HOOP_Y,HOOP_Z);
rimMesh.castShadow=true; scene.add(rimMesh);

// Net
(function(){
  const segs=12,netH=.42,topR=RIM_R-.02,botR=RIM_R*.25;
  const nm=new THREE.LineBasicMaterial({color:0xffffff,opacity:.55,transparent:true});
  const v=(a,r,yo)=>new THREE.Vector3(Math.cos(a)*r,HOOP_Y-yo,HOOP_Z+Math.sin(a)*r);
  for(let i=0;i<segs;i++){
    const a=(i/segs)*Math.PI*2,a2=((i+1)/segs)*Math.PI*2;
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v(a,topR,0),v(a,botR,netH)]),nm));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v(a2,topR,0),v(a,botR,netH)]),nm));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      v(a,topR*.62+botR*.38,netH*.45),v(a2,topR*.62+botR*.38,netH*.45)]),nm));
  }
})();

// ── Main ball ──
const ballMat=new THREE.MeshStandardMaterial({color:0xff6200,roughness:.62,metalness:.05});
const ball=new THREE.Mesh(new THREE.SphereGeometry(BALL_R,32,32),ballMat);
ball.castShadow=true;
const seamMat=new THREE.LineBasicMaterial({color:0x2a0800,opacity:.65,transparent:true});
[[0],[1],[2]].forEach(([ai])=>{
  const pts=[];
  for(let i=0;i<=48;i++){
    const t=(i/48)*Math.PI*2,c=Math.cos(t)*(BALL_R+.002),s=Math.sin(t)*(BALL_R+.002);
    if(ai===0) pts.push(new THREE.Vector3(0,c,s));
    else if(ai===1) pts.push(new THREE.Vector3(c,0,s));
    else pts.push(new THREE.Vector3(c,s,0));
  }
  ball.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),seamMat));
});
scene.add(ball);

// Tray balls (3 visual balls in waiting tray)
const trayMat=new THREE.MeshStandardMaterial({color:0xff6200,roughness:.65});
const trayBalls=[-0.68,0,0.68].map(x=>{
  const tb=new THREE.Mesh(new THREE.SphereGeometry(BALL_R*.88,16,16),trayMat.clone());
  tb.position.set(x,0.34,2.25);
  tb.castShadow=true; scene.add(tb); return tb;
});
// Tray board
const tray=new THREE.Mesh(
  new THREE.BoxGeometry(2.6,.06,0.7),
  new THREE.MeshStandardMaterial({color:0xd4702a,roughness:.7})
);
tray.position.set(0,.3,2.2); scene.add(tray);
// "BASKETBALL" label on tray
const labelMat=new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.9});
const labelMesh=new THREE.Mesh(new THREE.PlaneGeometry(1.6,.08),labelMat);
labelMesh.position.set(0,.33,2.0); labelMesh.rotation.x=-Math.PI/2; scene.add(labelMesh);

// Shadow blob
const blob=new THREE.Mesh(
  new THREE.CircleGeometry(.22,32),
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.5})
);
blob.rotation.x=-Math.PI/2; blob.position.y=.01; scene.add(blob);

// ── Arc preview dots ──
const ARC_N=16;
const arcDots=Array.from({length:ARC_N},(_,i)=>{
  const d=new THREE.Mesh(
    new THREE.SphereGeometry(Math.max(.024,.055-i*.002),6,6),
    new THREE.MeshBasicMaterial({color:0xffdd00,transparent:true,opacity:Math.max(.08,.82-i*.05)})
  );
  d.visible=false; scene.add(d); return d;
});

function showArc(dx,dy){
  const nUp=-dy/H();
  if(nUp<.025){hideArc();return;}
  const vx0=(dx/H())*18,vy0=nUp*40,vz0=-nUp*44;
  const sdt=.055;
  let px=ballHome.x,py=ballHome.y,pz=ballHome.z,vx=vx0,vy=vy0,vz=vz0;
  arcDots.forEach(d=>{
    vy+=GRAVITY*sdt; px+=vx*sdt; py+=vy*sdt; pz+=vz*sdt;
    if(py<.05||pz<-4){d.visible=false;}
    else{d.position.set(px,py,pz);d.visible=true;}
  });
}
function hideArc(){arcDots.forEach(d=>d.visible=false);}

// ── Game state ──
let scored=0,hiScore=0,shots=0,streak=0;
let inFlight=false,scoredThisShot=false;
let gameActive=false,timeLeft=60;
let vel=new THREE.Vector3();
let popTimer=0,resetTimer=0,awaitReset=false;
let drag=false,dsx=0,dsy=0;
let ballHome=BALL_HOME.clone();

const popupEl=document.getElementById('popup');
const gameoverEl=document.getElementById('gameover');
const hintEl=document.getElementById('hint');
document.getElementById('replay-btn').addEventListener('click',startGame);

function showPopup(txt,col){
  popupEl.textContent=txt; popupEl.style.color=col;
  popupEl.style.opacity='1'; popTimer=1.1;
}
function flashRim(col){
  rimMesh.material.color.set(col);
  setTimeout(()=>rimMesh.material.color.set(0xff5500),240);
}

// ── Controls ──
function pDown(cx,cy){if(!gameActive||inFlight)return;drag=true;dsx=cx;dsy=cy;}
function pMove(cx,cy){if(drag)showArc(cx-dsx,cy-dsy);}
function pUp(cx,cy){
  if(!drag)return; drag=false; hideArc();
  const dx=cx-dsx,dy=cy-dsy,nUp=-dy/H();
  if(nUp<.025||inFlight||!gameActive)return;
  shots++;
  vel.set((dx/H())*18,nUp*40,-nUp*44);
  ball.position.copy(ballHome);
  inFlight=true; scoredThisShot=false; awaitReset=false;
  hintEl.style.opacity='0';
}
window.addEventListener('mousedown',e=>pDown(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>pMove(e.clientX,e.clientY));
window.addEventListener('mouseup',e=>pUp(e.clientX,e.clientY));
window.addEventListener('touchstart',e=>{e.preventDefault();pDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('touchmove',e=>{e.preventDefault();pMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('touchend',e=>{e.preventDefault();pUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});

// ── Score check ──
function checkScore(){
  const {x:bx,y:by,z:bz}=ball.position;
  if(vel.y<0&&Math.abs(by-HOOP_Y)<.32){
    const hd=Math.sqrt(bx*bx+(bz-HOOP_Z)*(bz-HOOP_Z));
    if(hd<RIM_R-.09&&!scoredThisShot){
      scoredThisShot=true; scored++; streak++;
      if(scored>hiScore) hiScore=scored;
      flashRim(0x00ff88);
      if(streak>=3) showPopup(`🔥 ${streak}連中！`,'#ff9900');
      else if(streak===2) showPopup('NICE! ×2 🔥','#ffd700');
      else showPopup('NICE! 🏀','#00e5ff');
    }
  }
}

// ── Game flow ──
function startGame(){
  scored=0; shots=0; streak=0;
  inFlight=false; scoredThisShot=false; awaitReset=false;
  timeLeft=60; gameActive=true;
  vel.set(0,0,0);
  ballHome.copy(BALL_HOME);
  ball.position.copy(ballHome);
  gameoverEl.style.display='none';
  hintEl.style.opacity='.5';
  trayBalls.forEach((tb,i)=>{tb.visible=true;tb.position.set((i-1)*.68,0.34,2.25);});
  hideArc();
}
function endGame(){
  gameActive=false;
  const rate=shots>0?Math.round(scored/shots*100):0;
  document.getElementById('final-score').textContent=`${scored} 分`;
  document.getElementById('final-rate').textContent=`投 ${shots} 球・命中率 ${rate}%`;
  gameoverEl.style.display='flex';
}

// ── Loop ──
const clock=new THREE.Clock();
// Blink LED lights
let ledT=0;
function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),.05);

  if(gameActive){ timeLeft-=dt; if(timeLeft<=0){timeLeft=0;endGame();} }

  // Blink arch LEDs when time is low
  ledT+=dt;
  if(gameActive&&timeLeft<=10){
    const blink=Math.sin(ledT*8)>.0;
    scene.children.forEach(c=>{if(c.material===ledMat||(c.material&&c.material.color&&c.material.color.equals(new THREE.Color(0x22ccff)))){}});
  }

  if(inFlight){
    vel.y+=GRAVITY*dt;
    ball.position.addScaledVector(vel,dt);
    ball.rotation.x+=vel.z*dt*3;
    ball.rotation.z-=vel.x*dt*3;
    const bh=ball.position.y;
    blob.position.set(ball.position.x,.01,ball.position.z);
    blob.scale.setScalar(Math.max(.15,1-bh*.12));
    blob.material.opacity=Math.max(.04,.5-bh*.05);
    checkScore();
    if(!awaitReset&&(ball.position.y<-.3||ball.position.z<-5||ball.position.z>5)){
      awaitReset=true; resetTimer=0;
      if(!scoredThisShot){streak=0;showPopup('MISS','#ff4444');}
    }
    if(awaitReset){
      resetTimer+=dt;
      if(resetTimer>.55){
        inFlight=false; awaitReset=false; scoredThisShot=false;
        vel.set(0,0,0);
        ballHome.x=(Math.random()-.5)*.45;
        ball.position.copy(ballHome);
        trayBalls.forEach((tb,i)=>tb.position.set((i-1)*.68+ballHome.x*.2,0.34,2.25));
      }
    }
  } else {
    const t=clock.getElapsedTime();
    ball.position.set(ballHome.x,ballHome.y+Math.sin(t*2.2)*.03,ballHome.z);
    blob.position.set(ballHome.x,.01,ballHome.z);
    blob.scale.setScalar(1); blob.material.opacity=.45;
  }

  if(popTimer>0){popTimer-=dt;popupEl.style.opacity=String(Math.max(0,Math.min(1,popTimer/.25)));}

  drawBoard(timeLeft,scored,hiScore,gameActive);
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.fov=getFOV(); camera.aspect=W()/H();
  camera.updateProjectionMatrix(); renderer.setSize(W(),H());
});

startGame(); tick();
</script>
</body>
</html>
