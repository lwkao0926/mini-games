<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎱 撞球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#000;overflow:hidden;font-family:'Microsoft JhengHei',sans-serif;}
canvas{display:block;}

#hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;
  background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.14);border-radius:12px;
  padding:7px 22px;text-align:center;color:#fff;}
#hud-score{font-size:1.4em;font-weight:900;color:#00ff88;text-shadow:0 0 10px #00cc66;}

/* Mode badge (orbit / aim) */
#mode-badge{position:fixed;top:12px;left:14px;z-index:10;pointer-events:none;
  padding:6px 12px;border-radius:8px;font-size:.78em;font-weight:700;letter-spacing:.06em;}
#mode-badge.orbit{background:rgba(0,80,255,.55);color:#99ccff;border:1px solid rgba(80,140,255,.5);}
#mode-badge.aim  {background:rgba(255,80,0,.55); color:#ffcc99;border:1px solid rgba(255,140,80,.5);}

/* Mode toggle button */
#mode-btn{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:10;
  padding:11px 38px;font-size:1em;font-weight:700;border-radius:50px;cursor:pointer;
  font-family:'Microsoft JhengHei',sans-serif;letter-spacing:.08em;border:none;outline:none;}
#mode-btn.to-aim{background:linear-gradient(135deg,#00aa44,#00ff66);color:#001a0a;
  box-shadow:0 0 18px rgba(0,200,80,.6);}
#mode-btn.to-orbit{background:linear-gradient(135deg,#0044ff,#0099ff);color:#fff;
  box-shadow:0 0 18px rgba(0,120,255,.5);}

/* Power bar */
#pw-wrap{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10;
  display:none;text-align:center;}
#pw-bg{width:170px;height:13px;background:rgba(0,0,0,.65);border:1px solid #555;border-radius:7px;overflow:hidden;}
#pw-fill{height:100%;width:0%;background:linear-gradient(to right,#00cc44,#ffcc00,#ff3300);transition:width .04s linear;}
#pw-lbl{color:#ffcc00;font-size:.76em;margin-top:3px;}

/* Shoot button (left side, aim mode only) */
@keyframes shoot-charge{0%,100%{box-shadow:0 0 16px #00aa44,inset 0 0 10px rgba(0,200,80,.2)}50%{box-shadow:0 0 36px #00ff66,inset 0 0 22px rgba(0,255,100,.4)}}
@keyframes shoot-ready{0%,100%{box-shadow:0 0 26px #ff4400,inset 0 0 16px rgba(255,80,0,.3)}50%{box-shadow:0 0 55px #ff6600,inset 0 0 34px rgba(255,120,0,.5)}}
#shoot-btn{position:fixed;left:14px;top:50%;transform:translateY(-50%);
  width:76px;height:76px;border-radius:50%;z-index:12;display:none;
  background:radial-gradient(circle at 38% 35%,#007733,#002211);
  border:2.5px solid rgba(0,220,80,.65);
  box-shadow:0 0 18px rgba(0,180,60,.5);
  cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none;
  flex-direction:column;align-items:center;justify-content:center;
  color:#fff;font-size:.72em;font-weight:700;line-height:1.4;text-align:center;
  font-family:'Microsoft JhengHei',sans-serif;}
#shoot-btn.charging{animation:shoot-charge .35s ease-in-out infinite;}
#shoot-btn.ready{animation:shoot-ready .25s ease-in-out infinite;}

/* Spin UI */
#spin-wrap{position:fixed;bottom:68px;right:14px;z-index:11;display:none;text-align:center;}
#spin-lbl{color:rgba(255,255,255,.55);font-size:.70em;margin-bottom:3px;}
#spin-cvs{display:block;cursor:pointer;border-radius:50%;}

/* Message popup */
#msg{position:fixed;top:33%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(1.8em,8vw,3.2em);font-weight:900;pointer-events:none;
  text-shadow:0 0 22px currentColor;opacity:0;z-index:15;white-space:nowrap;}

/* Hint */
#hint{position:fixed;bottom:132px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.45);font-size:.82em;text-align:center;z-index:10;pointer-events:none;}

/* ── Start Screen ── */
@keyframes ball-float{0%,100%{transform:translateY(0)rotate(0deg)}50%{transform:translateY(-14px)rotate(200deg)}}
@keyframes neon-pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes btn-glow-g{0%,100%{box-shadow:0 0 22px #00aa44,0 4px 16px rgba(0,160,60,.7)}50%{box-shadow:0 0 55px #00ff66,0 4px 35px rgba(0,220,90,.95)}}
@keyframes slide-up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes go-fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
#start-screen{position:fixed;inset:0;
  background:
    repeating-linear-gradient(90deg,rgba(0,80,25,.06) 0px,transparent 1px,transparent 62px,rgba(0,80,25,.06) 63px),
    repeating-linear-gradient(0deg,rgba(0,80,25,.06) 0px,transparent 1px,transparent 62px,rgba(0,80,25,.06) 63px),
    radial-gradient(ellipse at 50% 38%,#071e10 0%,#000a04 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;gap:9px;}
#start-screen.hidden{display:none;}
#s-ball{font-size:clamp(3em,14vw,6em);animation:ball-float 1.7s ease-in-out infinite;filter:drop-shadow(0 0 18px #00ff66);}
#s-title{font-size:clamp(2em,9vw,4.8em);font-weight:900;color:#00cc44;letter-spacing:.26em;
  text-shadow:0 0 20px #009933,0 0 55px #007722;animation:slide-up .6s ease-out;}
#s-sub{font-size:clamp(.7em,2.6vw,1em);color:#00eeff;letter-spacing:.42em;
  text-shadow:0 0 12px #00aaff;animation:neon-pulse 2.2s ease-in-out infinite;}
#s-info{color:rgba(255,255,255,.62);font-size:clamp(.75em,2.8vw,.95em);text-align:center;line-height:2;margin:8px 0 4px;}
#s-btn{padding:14px 54px;font-size:clamp(1em,4vw,1.45em);font-weight:900;
  background:linear-gradient(135deg,#005522,#00cc44);color:#fff;
  border:2px solid rgba(0,200,80,.5);border-radius:58px;cursor:pointer;
  font-family:'Microsoft JhengHei',sans-serif;letter-spacing:.12em;
  animation:btn-glow-g 1.8s ease-in-out infinite;}
#s-dots{display:flex;gap:10px;margin-top:4px;}
#s-dots span{width:8px;height:8px;border-radius:50%;display:inline-block;animation:neon-pulse 1.1s ease-in-out infinite;}

/* ── Game Over ── */
#go-screen{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,#001a08 0%,#000508 100%);
  display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;gap:6px;color:#fff;}
#go-crown{font-size:2.8em;filter:drop-shadow(0 0 14px #ffd700);animation:go-fade .5s ease-out;}
#go-h2{font-size:2.4em;font-weight:900;color:#ffd700;letter-spacing:.18em;
  text-shadow:0 0 24px #ffaa00;animation:go-fade .5s .1s ease-out both;}
#go-div{width:200px;height:2px;background:linear-gradient(to right,transparent,#00ff88,transparent);margin:6px 0;animation:go-fade .5s .2s ease-out both;}
#go-score{font-size:4.5em;font-weight:900;color:#00ff88;text-shadow:0 0 28px #00cc44;animation:go-fade .5s .3s ease-out both;}
#go-info{font-size:.92em;opacity:.6;animation:go-fade .5s .4s ease-out both;}
#go-btn{margin-top:20px;padding:13px 52px;font-size:1.1em;font-weight:700;
  background:linear-gradient(135deg,#0044ff,#0099ff);color:#fff;
  border:2px solid rgba(80,180,255,.5);border-radius:50px;cursor:pointer;
  font-family:'Microsoft JhengHei',sans-serif;animation:btn-glow-g 1.7s ease-in-out infinite;}
</style>
</head>
<body>

<div id="start-screen">
  <div id="s-ball">🎱</div>
  <h1 id="s-title">撞 球</h1>
  <p id="s-sub">BILLIARDS ARCADE</p>
  <div id="s-info">旋轉視角後切換瞄準模式<br>調整擊球點可打上旋 / 回拉球</div>
  <button id="s-btn">開 始 遊 戲</button>
  <div id="s-dots">
    <span style="background:#ff3300;animation-delay:0s"></span>
    <span style="background:#ffd700;animation-delay:.15s"></span>
    <span style="background:#00cc44;animation-delay:.3s"></span>
    <span style="background:#0044ff;animation-delay:.45s"></span>
    <span style="background:#cc00ff;animation-delay:.6s"></span>
  </div>
</div>

<div id="go-screen">
  <div id="go-crown">🏆</div>
  <div id="go-h2">完 成！</div>
  <div id="go-div"></div>
  <div id="go-score"></div>
  <div id="go-info"></div>
  <button id="go-btn">再玩一次</button>
</div>

<div id="mode-badge" class="orbit">旋轉視角</div>
<div id="hud"><div style="font-size:.72em;color:#aaa;letter-spacing:.08em;">已入袋</div><div id="hud-score">0 / 15</div></div>
<div id="pw-wrap"><div id="pw-bg"><div id="pw-fill"></div></div><div id="pw-lbl">0%</div></div>
<div id="spin-wrap"><div id="spin-lbl">擊球點</div><canvas id="spin-cvs" width="84" height="84"></canvas></div>
<div id="shoot-btn">🎱<br>擊球</div>
<div id="hint">拖曳旋轉視角・點「進入瞄準」後出桿</div>
<div id="msg"></div>
<button id="mode-btn" class="to-aim">🎱 進入瞄準</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────
const TW=1.12,TL=2.24,RW=0.118,RH=0.058,BR=0.0285;
const PC_C=0.094,PC_S=0.078;
const W=()=>window.innerWidth,H=()=>window.innerHeight;

const POCKETS=[
  {x:-TW/2,z:-TL/2,r:0.105},{x:TW/2,z:-TL/2,r:0.105},
  {x:-TW/2,z:0,    r:0.090},{x:TW/2,z:0,    r:0.090},
  {x:-TW/2,z: TL/2,r:0.105},{x:TW/2,z: TL/2,r:0.105},
];

const BDEFS=[
  {n:0, col:0xffffff,stripe:false},
  {n:1, col:0xFFD700,stripe:false},{n:2, col:0x1144CC,stripe:false},
  {n:3, col:0xCC1111,stripe:false},{n:4, col:0x7700BB,stripe:false},
  {n:5, col:0xFF6600,stripe:false},{n:6, col:0x006622,stripe:false},
  {n:7, col:0x8B1800,stripe:false},{n:8, col:0x111111,stripe:false},
  {n:9, col:0xFFD700,stripe:true}, {n:10,col:0x1144CC,stripe:true},
  {n:11,col:0xCC1111,stripe:true}, {n:12,col:0x7700BB,stripe:true},
  {n:13,col:0xFF6600,stripe:true}, {n:14,col:0x006622,stripe:true},
  {n:15,col:0x8B1800,stripe:true},
];
const RACK=[1,9,2,3,8,10,11,4,14,12,5,13,6,15,7];

// ── Renderer ───────────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x07080f);
scene.fog=new THREE.FogExp2(0x07080f,0.068);

// ── Camera (orbit) ─────────────────────────────────────────────────
let camTheta=0, camPhi=0.38, camDist=2.50;
let mode='orbit'; // declared early — updateCamera() checks it at init time
const camTarget=new THREE.Vector3(0,0.05,0);
const camera=new THREE.PerspectiveCamera(52,W()/H(),0.01,30);
function updateCamera(){
  if(mode==='aim'){
    const cb=getCueBall();
    if(cb){
      const bx=cb.body.position.x,bz=cb.body.position.z;
      const D=0.60;
      camera.position.set(
        bx-Math.sin(camTheta)*D,
        BR+0.16+0.32*Math.cos(camPhi),
        bz-Math.cos(camTheta)*D
      );
      camera.lookAt(bx+Math.sin(camTheta)*2.2,0.01,bz+Math.cos(camTheta)*2.2);
    }
  } else {
    camera.position.set(
      camDist*Math.sin(camPhi)*Math.sin(camTheta),
      camDist*Math.cos(camPhi)+0.12,
      camDist*Math.sin(camPhi)*Math.cos(camTheta)
    );
    camera.lookAt(camTarget);
  }
}
updateCamera();

// ── Lighting ───────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff,0.16));
const spot=new THREE.SpotLight(0xfff8e8,3.2,5.5,Math.PI/4,0.28,1);
spot.position.set(0,3.0,0);spot.castShadow=true;
spot.shadow.mapSize.set(2048,2048);spot.shadow.bias=-0.001;
scene.add(spot);scene.add(spot.target);
const blL=new THREE.PointLight(0x0033ff,0.9,3.5);blL.position.set(-1.6,1.3,0);scene.add(blL);
const prR=new THREE.PointLight(0x6600cc,0.7,3.5);prR.position.set( 1.6,1.3,0);scene.add(prR);
const wrmF=new THREE.PointLight(0xff9900,0.4,2.5);wrmF.position.set(0,1.1,1.5);scene.add(wrmF);

// ── Felt + Table ───────────────────────────────────────────────────
function makeFeltTex(){
  const c=document.createElement('canvas');c.width=c.height=256;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#1b6e2c';ctx.fillRect(0,0,256,256);
  ctx.strokeStyle='rgba(0,0,0,.07)';ctx.lineWidth=1;
  for(let i=0;i<256;i+=5){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,256);ctx.stroke();}
  for(let i=0;i<256;i+=5){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(256,i);ctx.stroke();}
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(9,18);return t;
}
const feltMat=new THREE.MeshStandardMaterial({map:makeFeltTex(),roughness:0.92,metalness:0});
const felt=new THREE.Mesh(new THREE.BoxGeometry(TW,0.018,TL),feltMat);
felt.position.y=-0.009;felt.receiveShadow=true;scene.add(felt);

// Head string
const mkLine=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.32});
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-TW/2+0.01,0.012,TL/4),new THREE.Vector3(TW/2-0.01,0.012,TL/4)]),mkLine));
// Spots
const dotGeo=new THREE.CircleGeometry(0.009,16);
const dotMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.42});
[TL/4,-TL/4,0].forEach(z=>{const d=new THREE.Mesh(dotGeo,dotMat.clone());d.rotation.x=-Math.PI/2;d.position.set(0,0.012,z);scene.add(d);});

// Pockets – dark holes + neon ring + depth cylinder
const phMat=new THREE.MeshBasicMaterial({color:0x010106});
const nPktMat=new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0.55,side:THREE.DoubleSide});
POCKETS.forEach(({x,z,r})=>{
  const ph=new THREE.Mesh(new THREE.CircleGeometry(r*.92,28),phMat);ph.rotation.x=-Math.PI/2;ph.position.set(x,0.004,z);scene.add(ph);
  const pr=new THREE.Mesh(new THREE.RingGeometry(r*.88,r,28),nPktMat.clone());pr.rotation.x=-Math.PI/2;pr.position.set(x,0.005,z);scene.add(pr);
  const pc=new THREE.Mesh(new THREE.CylinderGeometry(r*.85,r*.85,.18,20),new THREE.MeshBasicMaterial({color:0x000000}));pc.position.set(x,-.08,z);scene.add(pc);
});

// Rails – split segments with pocket gaps so openings are visible
const railMat=new THREE.MeshStandardMaterial({color:0x3a1605,roughness:0.65,metalness:0.12});
const neonRM=()=>new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0.52,blending:THREE.AdditiveBlending,depthWrite:false});
function addRail(w,h,d,x,z){
  const r=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),railMat);r.position.set(x,h/2,z);r.castShadow=true;r.receiveShadow=true;scene.add(r);
  const ne=new THREE.Mesh(new THREE.BoxGeometry(w*.97,0.005,Math.min(w,d)*.9),neonRM());ne.position.set(x,h,z);scene.add(ne);
}
// Gap constants
const CGZ=0.13,SGH=0.11; // corner gap (z), side half-gap (z)
const LS=TL/2-CGZ-SGH;   // long segment length ≈ 0.88
const LZ=SGH+LS/2;       // segment centre z offset ≈ 0.55
const ES=TW-2*CGZ;       // short end rail length ≈ 0.86
// Long side rails: 2 segments each, corner and side openings
[-(TW/2+RW/2),(TW/2+RW/2)].forEach(rx=>{
  addRail(RW,RH,LS,rx,-LZ);
  addRail(RW,RH,LS,rx, LZ);
});
// Short end rails: single segment, corner openings on both sides
addRail(ES,RH,RW,0,-(TL/2+RW/2));
addRail(ES,RH,RW,0, (TL/2+RW/2));
const tBody=new THREE.Mesh(new THREE.BoxGeometry(TW+RW*2+.04,.22,TL+RW*2+.04),new THREE.MeshStandardMaterial({color:0x260e03,roughness:.75}));
tBody.position.y=-.12;scene.add(tBody);
// Outer apron border – continuous perimeter, frames pocket openings
const apronMat=new THREE.MeshStandardMaterial({color:0x1e0a02,roughness:0.64,metalness:0.07});
const AW=0.020;
[-(TW/2+RW+AW/2),(TW/2+RW+AW/2)].forEach(ax=>{
  const m=new THREE.Mesh(new THREE.BoxGeometry(AW,RH+0.004,TL+(RW+AW)*2),apronMat);m.position.set(ax,(RH+0.004)/2,0);scene.add(m);
});
[-(TL/2+RW+AW/2),(TL/2+RW+AW/2)].forEach(az=>{
  const m=new THREE.Mesh(new THREE.BoxGeometry(TW+(RW+AW)*2,RH+0.004,AW),apronMat);m.position.set(0,(RH+0.004)/2,az);scene.add(m);
});
const legMat=new THREE.MeshStandardMaterial({color:0x1a0802,roughness:.7});
[[-TW/2-.02,-TL/2-.02],[TW/2+.02,-TL/2-.02],[-TW/2-.02,TL/2+.02],[TW/2+.02,TL/2+.02]].forEach(([x,z])=>{
  const lg=new THREE.Mesh(new THREE.BoxGeometry(.065,.5,.065),legMat);lg.position.set(x,-.34,z);scene.add(lg);
});
// Spotlight cone
const cone=new THREE.Mesh(new THREE.CylinderGeometry(.01,.85,3.2,24,1,true),
  new THREE.MeshBasicMaterial({color:0xfff8e0,transparent:true,opacity:.038,side:THREE.DoubleSide}));
cone.position.set(0,1.4,0);scene.add(cone);

// ── Ball textures ──────────────────────────────────────────────────
function cAdj(hex,amt){
  return`rgb(${Math.min(255,Math.max(0,((hex>>16)&0xff)+amt))},${Math.min(255,Math.max(0,((hex>>8)&0xff)+amt))},${Math.min(255,Math.max(0,(hex&0xff)+amt))})`;
}
function makeBallTex(n,col,isStripe){
  const SZ=128,cv=document.createElement('canvas');cv.width=cv.height=SZ;
  const ctx=cv.getContext('2d'),R=SZ/2,hx='#'+col.toString(16).padStart(6,'0');
  if(n===0){
    const g=ctx.createRadialGradient(44,38,2,R,R,R);g.addColorStop(0,'#fff');g.addColorStop(.55,'#f2f2f2');g.addColorStop(1,'#ccc');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
  } else if(isStripe){
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=hx;ctx.fillRect(0,SZ*.33,SZ,SZ*.34);
    ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(R,R,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.font=`bold ${n>9?21:25}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n,R,R+1);
  } else if(n===8){
    ctx.fillStyle='#0d0d0d';ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(R,R,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0d0d0d';ctx.font='bold 25px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('8',R,R+1);
  } else {
    const g=ctx.createRadialGradient(46,40,2,R,R,R);g.addColorStop(0,cAdj(col,60));g.addColorStop(.5,hx);g.addColorStop(1,cAdj(col,-50));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(R,R,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.font=`bold ${n>9?21:25}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n,R,R+1);
  }
  const sp=ctx.createRadialGradient(46,40,0,50,44,30);sp.addColorStop(0,'rgba(255,255,255,.55)');sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sp;ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
  return new THREE.CanvasTexture(cv);
}

// ── Physics ─────────────────────────────────────────────────────────
const world=new CANNON.World();
world.gravity.set(0,-9.8,0);
world.broadphase=new CANNON.NaiveBroadphase();
world.solver.iterations=14;
const mFelt=new CANNON.Material('felt'),mBall=new CANNON.Material('ball'),mRail=new CANNON.Material('rail');
world.addContactMaterial(new CANNON.ContactMaterial(mBall,mBall,{restitution:.93,friction:.03}));
world.addContactMaterial(new CANNON.ContactMaterial(mBall,mFelt,{restitution:.10,friction:.44}));
world.addContactMaterial(new CANNON.ContactMaterial(mBall,mRail,{restitution:.62,friction:.18}));
const fBody=new CANNON.Body({mass:0,material:mFelt});fBody.addShape(new CANNON.Plane());
fBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0),-Math.PI/2);world.addBody(fBody);
function addRailBody(hw,hh,hd,x,z){
  const b=new CANNON.Body({mass:0,material:mRail});b.addShape(new CANNON.Box(new CANNON.Vec3(hw,hh,hd)));
  b.position.set(x,hh,z);world.addBody(b);
}
addRailBody(RW/2,RH/2,(TL+RW*2)/2,-(TW/2+RW/2),0);addRailBody(RW/2,RH/2,(TL+RW*2)/2,(TW/2+RW/2),0);
addRailBody((TW+RW*2)/2,RH/2,RW/2,0,-(TL/2+RW/2));addRailBody((TW+RW*2)/2,RH/2,RW/2,0,(TL/2+RW/2));

// ── Balls ────────────────────────────────────────────────────────────
let balls=[];

function makeBall(def,x,z){
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(BR,32,32),
    new THREE.MeshStandardMaterial({map:makeBallTex(def.n,def.col,def.stripe),roughness:.30,metalness:.06}));
  mesh.castShadow=true;mesh.position.set(x,BR,z);scene.add(mesh);
  const body=new CANNON.Body({mass:.170,material:mBall,linearDamping:.58,angularDamping:.64});
  body.addShape(new CANNON.Sphere(BR));body.position.set(x,BR,z);world.addBody(body);
  const ball={mesh,body,n:def.n,pocketed:false,isCue:def.n===0};
  balls.push(ball);return ball;
}

const FS=-TL/4,ROW_DZ=BR*2*Math.sin(Math.PI/3),ROW_DX=BR*2;
function spawnBalls(){
  balls.forEach(b=>{world.remove(b.body);scene.remove(b.mesh);});balls=[];
  let ri=0;
  for(let row=0;row<5;row++)for(let col=0;col<=row;col++){
    const n=RACK[ri++];makeBall(BDEFS.find(d=>d.n===n),(col-row/2)*ROW_DX,FS-row*ROW_DZ);
  }
  makeBall(BDEFS[0],0,TL/4);
}

function getCueBall(){return balls.find(b=>b.isCue);}

// ── Aim dots, ghost ball, cue mesh ────────────────────────────────────
const AIM_N=32;
const aimDots=Array.from({length:AIM_N},(_,i)=>{
  const d=new THREE.Mesh(new THREE.SphereGeometry(Math.max(.004,BR*.46-i*.008),8,8),
    new THREE.MeshBasicMaterial({color:0xffee44,transparent:true,opacity:Math.max(.04,.9-i*.028),depthWrite:false}));
  d.visible=false;scene.add(d);return d;
});
const ghostMesh=new THREE.Mesh(new THREE.SphereGeometry(BR,20,20),
  new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.20,depthWrite:false}));
ghostMesh.visible=false;scene.add(ghostMesh);

const cueGroup=new THREE.Group();
const cueStkMat=new THREE.MeshStandardMaterial({color:0xc8a060,roughness:.55,metalness:.10});
const cueTipMat=new THREE.MeshStandardMaterial({color:0x4466bb,roughness:.7});
const cueStk=new THREE.Mesh(new THREE.CylinderGeometry(.005,.013,.9,8),cueStkMat);
const cueTip=new THREE.Mesh(new THREE.CylinderGeometry(.008,.005,.06,8),cueTipMat);
cueTip.position.y=.48;cueGroup.add(cueStk);cueGroup.add(cueTip);
cueGroup.rotation.x=Math.PI/2;cueGroup.visible=false;scene.add(cueGroup);

// ── Spin UI ─────────────────────────────────────────────────────────
let spinX=0,spinY=0;  // spin: -1..1 each axis
const spinCvs=document.getElementById('spin-cvs');
const spinCtx=spinCvs.getContext('2d');
function drawSpinUI(){
  const SZ=spinCvs.width,R=SZ/2;
  spinCtx.clearRect(0,0,SZ,SZ);
  spinCtx.fillStyle='rgba(0,0,0,.75)';spinCtx.beginPath();spinCtx.arc(R,R,R-1,0,Math.PI*2);spinCtx.fill();
  spinCtx.strokeStyle='rgba(255,255,255,.28)';spinCtx.lineWidth=1.5;spinCtx.beginPath();spinCtx.arc(R,R,R-1,0,Math.PI*2);spinCtx.stroke();
  spinCtx.strokeStyle='rgba(255,255,255,.18)';spinCtx.lineWidth=1;
  spinCtx.beginPath();spinCtx.moveTo(R,5);spinCtx.lineTo(R,SZ-5);spinCtx.stroke();
  spinCtx.beginPath();spinCtx.moveTo(5,R);spinCtx.lineTo(SZ-5,R);spinCtx.stroke();
  // Dot
  const dotX=R+spinX*(R-9),dotY=R-spinY*(R-9);
  spinCtx.fillStyle='#ffdd00';spinCtx.shadowColor='#ffaa00';spinCtx.shadowBlur=10;
  spinCtx.beginPath();spinCtx.arc(dotX,dotY,7,0,Math.PI*2);spinCtx.fill();
  spinCtx.shadowBlur=0;
  // Labels
  spinCtx.fillStyle='rgba(255,255,255,.38)';spinCtx.font='9px Arial';spinCtx.textAlign='center';
  spinCtx.fillText('上旋',R,11);spinCtx.fillText('下旋',R,SZ-2);
}
drawSpinUI();

function handleSpinPt(e){
  const rect=spinCvs.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const R=spinCvs.width/2,dx=(cx-R)/(R-9),dy=-(cy-R)/(R-9);
  const len=Math.sqrt(dx*dx+dy*dy);
  spinX=len>1?dx/len:dx;spinY=len>1?dy/len:dy;
  drawSpinUI();
}
let spinPtId=null;
spinCvs.addEventListener('pointerdown',e=>{e.preventDefault();spinCvs.setPointerCapture(e.pointerId);spinPtId=e.pointerId;handleSpinPt(e);});
spinCvs.addEventListener('pointermove',e=>{if(spinPtId!==null&&e.pointerId===spinPtId)handleSpinPt(e);});
spinCvs.addEventListener('pointerup',e=>{if(e.pointerId===spinPtId)spinPtId=null;});

// ── Mode system ─────────────────────────────────────────────────────
let gameActive=false,ballsMoving=false;
const modeBadge=document.getElementById('mode-badge');
const modeBtn=document.getElementById('mode-btn');
const pwWrap=document.getElementById('pw-wrap');
const spinWrap=document.getElementById('spin-wrap');
const hintEl=document.getElementById('hint');
const msgEl=document.getElementById('msg');
const hudScore=document.getElementById('hud-score');
const startScreenEl=document.getElementById('start-screen');
const goScreenEl=document.getElementById('go-screen');

const shootBtnEl=document.getElementById('shoot-btn');
let shootCharging=false;

function startCharge(){
  if(!gameActive||ballsMoving||mode!=='aim')return;
  shootCharging=true;aimPower=0;isAiming=true;
  shootBtnEl.classList.add('charging');
}
function releaseCharge(){
  if(!shootCharging)return;
  shootCharging=false;
  shootBtnEl.classList.remove('charging','ready');
  if(aimPower>.04&&!ballsMoving)shoot();else endAim();
}
shootBtnEl.addEventListener('pointerdown',e=>{e.preventDefault();shootBtnEl.setPointerCapture(e.pointerId);startCharge();});
shootBtnEl.addEventListener('pointerup',e=>{e.preventDefault();releaseCharge();});
shootBtnEl.addEventListener('pointercancel',()=>releaseCharge());

function setMode(m){
  mode=m;orbitLast=null;shootCharging=false;
  if(m==='orbit'){
    modeBadge.textContent='旋轉視角';modeBadge.className='orbit';
    modeBtn.textContent='🎱 進入瞄準';modeBtn.className='to-aim';
    pwWrap.style.display='none';spinWrap.style.display='none';
    shootBtnEl.style.display='none';
    hintEl.textContent='拖曳旋轉視角・點「進入瞄準」後出桿';
    endAim();updateCamera();
  } else {
    modeBadge.textContent='瞄準模式';modeBadge.className='aim';
    modeBtn.textContent='↩ 旋轉視角';modeBtn.className='to-orbit';
    pwWrap.style.display='block';spinWrap.style.display='block';
    shootBtnEl.style.display='flex';
    hintEl.textContent='拖曳調整瞄準・左側按鈕蓄力出桿';
    const cb=getCueBall();
    if(cb){
      const cbz=cb.body.position.z;
      camTheta=(cbz>=0)?Math.PI:0;
      camPhi=0.92;
      aimAngle=camTheta;
      isAiming=true;
      showAimDisplay(Math.sin(aimAngle),Math.cos(aimAngle),cb.body.position);
    }
    updateCamera();
  }
}
modeBtn.addEventListener('click',()=>{if(!gameActive)return;setMode(mode==='orbit'?'aim':'orbit');});
modeBtn.addEventListener('touchend',e=>{e.preventDefault();if(!gameActive)return;setMode(mode==='orbit'?'aim':'orbit');},{passive:false});

// ── Raycasting ──────────────────────────────────────────────────────
const _ray=new THREE.Raycaster();
const _tpl=new THREE.Plane(new THREE.Vector3(0,1,0),0);
function ptrToXZ(cx,cy){
  _ray.setFromCamera({x:(cx/W())*2-1,y:-(cy/H())*2+1},camera);
  const pt=new THREE.Vector3();_ray.ray.intersectPlane(_tpl,pt);return pt;
}

// ── Aiming ───────────────────────────────────────────────────────────
let isAiming=false,aimAngle=0,aimPower=0;

function updateAimFromPt(pt){
  const cb=getCueBall();if(!cb)return;
  const pos=cb.body.position;
  const dx=pos.x-pt.x,dz=pos.z-pt.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.001)return;
  aimAngle=Math.atan2(dx,dz);
  aimPower=Math.min(1.0,dist*4.8);
  isAiming=true;
  showAimDisplay(dx/dist,dz/dist,pos);
}

function showAimDisplay(nx,nz,cb){
  const STEP=BR*3.8;
  let hitDist=Infinity;
  balls.forEach(b=>{
    if(b.pocketed||b.isCue)return;
    const bx=b.body.position.x,bz=b.body.position.z;
    const fx=bx-cb.x,fz=bz-cb.z;
    const dot=fx*nx+fz*nz;if(dot<0)return;
    const cross=fx*nz-fz*nx;
    if(Math.abs(cross)<BR*2){
      const d=dot-Math.sqrt(Math.max(0,BR*2*BR*2-cross*cross));
      if(d>0&&d<hitDist)hitDist=d;
    }
  });
  aimDots.forEach((d,i)=>{
    const dist=(i+.5)*STEP;
    if(dist>hitDist+.01){d.visible=false;return;}
    d.position.set(cb.x+nx*dist,.005,cb.z+nz*dist);d.visible=true;
    d.material.opacity=Math.max(.04,.88-i*.026);
  });
  if(hitDist<15){ghostMesh.position.set(cb.x+nx*hitDist,BR,cb.z+nz*hitDist);ghostMesh.visible=true;}
  else ghostMesh.visible=false;
  // Cue stick (only in orbit camera; behind-ball camera hides it)
  if(mode!=='aim'){
    const pull=.05+aimPower*.18;
    cueGroup.position.set(cb.x-nx*(BR+pull+.5),.018,cb.z-nz*(BR+pull+.5));
    cueGroup.rotation.y=-Math.atan2(nx,nz);
    cueGroup.visible=true;
  } else {
    cueGroup.visible=false;
  }
  // Power bar
  document.getElementById('pw-fill').style.width=(aimPower*100)+'%';
  const pwLbl=document.getElementById('pw-lbl');
  pwLbl.textContent=Math.round(aimPower*100)+'%';
  pwLbl.style.color=aimPower<.4?'#00cc44':aimPower<.75?'#ffcc00':'#ff3300';
}

function endAim(){
  isAiming=false;aimDots.forEach(d=>d.visible=false);ghostMesh.visible=false;cueGroup.visible=false;
}

function shoot(){
  if(!isAiming||aimPower<.04)return;
  const cb=getCueBall();if(!cb||cb.pocketed)return;
  const PSCALE=6.5;
  const speed=aimPower*PSCALE;
  const dx=Math.sin(aimAngle),dz=Math.cos(aimAngle);
  cb.body.velocity.set(dx*speed,0,dz*speed);
  // Apply spin: spinY = -1(backspin)..+1(topspin), spinX = sidespin
  const rollV=speed/BR*1.4;
  cb.body.angularVelocity.set(
    -dz*rollV*spinY,      // X: topspin/backspin axis
    rollV*spinX*.45,      // Y: sidespin
     dx*rollV*spinY       // Z: topspin/backspin axis
  );
  ballsMoving=true;shots++;sfx('shoot');endAim();setMode('orbit');
}

// ── Pointer handlers (canvas-scoped, pointer-capture based) ──────────
let orbitLast=null;
const cvs=renderer.domElement;

cvs.addEventListener('pointerdown',e=>{
  if(!gameActive)return;
  e.preventDefault();
  cvs.setPointerCapture(e.pointerId);
  orbitLast={x:e.clientX,y:e.clientY,id:e.pointerId};
  if(mode==='aim'&&!ballsMoving){
    isAiming=true;
    const cb=getCueBall();
    if(cb)showAimDisplay(Math.sin(aimAngle),Math.cos(aimAngle),cb.body.position);
  }
});
cvs.addEventListener('pointermove',e=>{
  if(!gameActive||!orbitLast||e.pointerId!==orbitLast.id)return;
  const dx=e.clientX-orbitLast.x,dy=e.clientY-orbitLast.y;
  if(mode==='aim'&&!ballsMoving){
    camTheta-=dx*.008;aimAngle=camTheta;
    camPhi=Math.max(.40,Math.min(1.35,camPhi+dy*.005));
    const cb=getCueBall();
    if(cb)showAimDisplay(Math.sin(aimAngle),Math.cos(aimAngle),cb.body.position);
  } else {
    camTheta-=dx*.007;
    camPhi=Math.max(.22,Math.min(1.38,camPhi-dy*.006));
  }
  updateCamera();orbitLast={x:e.clientX,y:e.clientY,id:e.pointerId};
});
cvs.addEventListener('pointerup',e=>{
  if(orbitLast&&e.pointerId===orbitLast.id)orbitLast=null;
});
cvs.addEventListener('pointercancel',()=>{orbitLast=null;shootCharging=false;endAim();});

// ── Audio ────────────────────────────────────────────────────────────
let _ac=null;
const ac=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;};
let _mg=null;
const mg=()=>{if(!_mg){_mg=ac().createGain();_mg.gain.value=0.6;_mg.connect(ac().destination);}return _mg;};
function sfx(type,vol=1){
  try{
    const c=ac(),t=c.currentTime,dst=mg();
    const osc=(tp,fr)=>{const o=c.createOscillator();o.type=tp;o.frequency.value=fr;return o;};
    const gn=(v,dur,ti=t)=>{const g=c.createGain();g.gain.setValueAtTime(v,ti);g.gain.exponentialRampToValueAtTime(.001,ti+dur);return g;};
    const run=(o,g,dur,ti=t)=>{o.connect(g);g.connect(dst);o.start(ti);o.stop(ti+dur);};
    const noise=(dur,fr,q,gv,ti=t)=>{
      const buf=c.createBuffer(1,Math.ceil(c.sampleRate*dur),c.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
      const s=c.createBufferSource();s.buffer=buf;
      const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=fr;f.Q.value=q;
      const g2=c.createGain();g2.gain.setValueAtTime(gv,ti);g2.gain.exponentialRampToValueAtTime(.001,ti+dur);
      s.connect(f);f.connect(g2);g2.connect(dst);s.start(ti);s.stop(ti+dur);
    };
    if(type==='shoot')noise(.09,700,4,.48);
    else if(type==='ballhit'){const o=osc('sine',750+Math.random()*200);o.frequency.exponentialRampToValueAtTime(280,t+.07);run(o,gn(.30*vol,.07),.07);}
    else if(type==='railhit'){const o=osc('sine',320);o.frequency.exponentialRampToValueAtTime(140,t+.10);run(o,gn(.20,.10),.10);}
    else if(type==='pocket'){noise(.12,400,3,.28);[523,660,784,1047].forEach((fr,i)=>{const ti=t+i*.065;const o=osc('triangle',fr);run(o,gn(.12,.28),.28,ti);});}
    else if(type==='cuefoul')[392,330,262].forEach((fr,i)=>{const ti=t+i*.15;const o=osc('sawtooth',fr);run(o,gn(.16,.22),.22,ti);});
    else if(type==='win')[523,659,784,1047,1319].forEach((fr,i)=>{const ti=t+i*.10;const o=osc('triangle',fr);run(o,gn(.14,.35),.35,ti);});
  }catch(e){}
}

// ── Collision sounds ──────────────────────────────────────────────────
const lastVels=new Map();
function detectSounds(){
  balls.forEach(b=>{
    if(b.pocketed)return;
    const v=b.body.velocity.length(),pv=lastVels.get(b.n)||0;
    if(pv-v>0.9&&v<pv*.82&&Math.random()<.55)sfx('ballhit',Math.min(1,(pv-v)/3));
    lastVels.set(b.n,v);
  });
}

// ── Pocket + win ─────────────────────────────────────────────────────
let pocketed=0,shots=0,msgTimer=0,startTime=0;
function showMsg(txt,col,dur=1.1){msgEl.textContent=txt;msgEl.style.color=col||'#fff';msgEl.style.opacity='1';msgTimer=dur;}
function updateHUD(){hudScore.textContent=`${pocketed} / 15`;}

function checkPockets(){
  balls.forEach(b=>{
    if(b.pocketed)return;
    const px=b.body.position.x,pz=b.body.position.z;
    for(const poc of POCKETS){
      const dx=px-poc.x,dz=pz-poc.z;
      if(Math.sqrt(dx*dx+dz*dz)<poc.r){
        b.pocketed=true;b.mesh.visible=false;
        b.body.velocity.set(0,0,0);b.body.angularVelocity.set(0,0,0);b.body.position.set(0,-1,0);
        if(b.isCue){sfx('cuefoul');showMsg('母球入洞！重置','#ff6644');}
        else{pocketed++;sfx('pocket');showMsg(`${b.n}號入洞！`,'#00ff88',.9);updateHUD();}
        if(pocketed>=15)setTimeout(endGame,700);
        break;
      }
    }
  });
}

function allStopped(){
  return balls.every(b=>b.pocketed||b.body.velocity.length()<.06&&b.body.angularVelocity.length()<.06);
}

// ── Game flow ─────────────────────────────────────────────────────────
function startGame(){
  ac();pocketed=0;shots=0;startTime=Date.now();ballsMoving=false;isAiming=false;
  startScreenEl.classList.add('hidden');goScreenEl.style.display='none';
  spawnBalls();updateHUD();gameActive=true;setMode('orbit');
}
function endGame(){
  gameActive=false;sfx('win');
  const sec=Math.round((Date.now()-startTime)/1e3),m=Math.floor(sec/60),s=sec%60;
  document.getElementById('go-score').textContent=`${pocketed} 球`;
  document.getElementById('go-info').textContent=`${shots} 桿・用時 ${m}:${String(s).padStart(2,'0')}`;
  goScreenEl.style.display='flex';
}
function respawnCue(){
  const cb=getCueBall();if(!cb)return;
  cb.pocketed=false;cb.mesh.visible=true;
  cb.body.position.set(0,BR,TL/4);
  cb.body.velocity.set(0,0,0);cb.body.angularVelocity.set(0,0,0);
}
document.getElementById('s-btn').addEventListener('click',startGame);
document.getElementById('s-btn').addEventListener('touchend',e=>{e.preventDefault();startGame();},{passive:false});
document.getElementById('go-btn').addEventListener('click',()=>{goScreenEl.style.display='none';startScreenEl.classList.remove('hidden');});
document.getElementById('go-btn').addEventListener('touchend',e=>{e.preventDefault();goScreenEl.style.display='none';startScreenEl.classList.remove('hidden');},{passive:false});

// ── Main loop ──────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),.05);
  if(gameActive&&ballsMoving){
    world.step(1/60,dt,3);
    balls.forEach(b=>{if(b.pocketed)return;b.mesh.position.copy(b.body.position);b.mesh.quaternion.copy(b.body.quaternion);});
    detectSounds();checkPockets();
    if(allStopped()){
      ballsMoving=false;
      const cb=getCueBall();if(cb&&cb.pocketed)respawnCue();
    }
  }
  if(msgTimer>0){msgTimer-=dt;msgEl.style.opacity=String(Math.max(0,Math.min(1,msgTimer/.22)));}
  // Auto-charge power while shoot button held
  if(mode==='aim'&&shootCharging&&gameActive&&!ballsMoving){
    aimPower=Math.min(1.0,aimPower+dt/1.8);
    const pf=document.getElementById('pw-fill'),pl=document.getElementById('pw-lbl');
    pf.style.width=(aimPower*100)+'%';
    pl.textContent=Math.round(aimPower*100)+'%';
    pl.style.color=aimPower<.4?'#00cc44':aimPower<.75?'#ffcc00':'#ff3300';
    if(aimPower>=0.95&&!shootBtnEl.classList.contains('ready'))shootBtnEl.classList.replace('charging','ready');
    const cb=getCueBall();
    if(cb&&isAiming)showAimDisplay(Math.sin(aimAngle),Math.cos(aimAngle),cb.body.position);
  }
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H());});
startScreenEl.classList.remove('hidden');
tick();
</script>
