<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎱 撞球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#000;overflow:hidden;font-family:'Microsoft JhengHei',sans-serif;}
canvas{display:block;}
#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.52);font-size:.88em;text-align:center;z-index:10;pointer-events:none;}
#msg{position:fixed;top:33%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(1.8em,8vw,3.5em);font-weight:900;pointer-events:none;
  text-shadow:0 0 24px currentColor;opacity:0;z-index:15;white-space:nowrap;}
#hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;
  background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.15);border-radius:12px;
  padding:8px 22px;text-align:center;color:#fff;font-size:.88em;}
#hud-score{font-size:1.55em;font-weight:900;color:#00ff88;text-shadow:0 0 10px #00cc66;}
#power-wrap{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
  display:none;z-index:10;text-align:center;}
#power-bar-bg{width:180px;height:14px;background:rgba(0,0,0,.65);
  border:1px solid #555;border-radius:7px;overflow:hidden;}
#power-bar-fill{height:100%;width:0%;
  background:linear-gradient(to right,#00cc44,#ffcc00,#ff3300);transition:width .04s linear;}
#power-lbl{color:#ffcc00;font-size:.78em;margin-top:3px;text-shadow:0 0 6px #ff8800;}

/* Start screen */
@keyframes ball-float{0%,100%{transform:translateY(0)rotate(0deg)}50%{transform:translateY(-14px)rotate(200deg)}}
@keyframes neon-pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes btn-glow-g{0%,100%{box-shadow:0 0 22px #00aa44,0 4px 16px rgba(0,160,60,.7)}50%{box-shadow:0 0 55px #00ff66,0 4px 35px rgba(0,220,90,.95)}}
@keyframes slide-up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes go-fade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
#start-screen{
  position:fixed;inset:0;
  background:
    repeating-linear-gradient(90deg,rgba(0,80,25,.06) 0px,transparent 1px,transparent 62px,rgba(0,80,25,.06) 63px),
    repeating-linear-gradient(0deg,rgba(0,80,25,.06) 0px,transparent 1px,transparent 62px,rgba(0,80,25,.06) 63px),
    radial-gradient(ellipse at 50% 38%,#071e10 0%,#000a04 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;gap:9px;}
#start-screen.hidden{display:none;}
#s-ball{font-size:clamp(3em,14vw,6em);animation:ball-float 1.7s ease-in-out infinite;filter:drop-shadow(0 0 18px #00ff66);}
#s-title{font-size:clamp(2em,9vw,4.8em);font-weight:900;color:#00cc44;letter-spacing:.26em;
  text-shadow:0 0 20px #009933,0 0 55px #007722;animation:slide-up .6s ease-out;}
#s-sub{font-size:clamp(.7em,2.6vw,1em);color:#00eeff;letter-spacing:.42em;
  text-shadow:0 0 12px #00aaff;animation:neon-pulse 2.2s ease-in-out infinite;}
#s-info{color:rgba(255,255,255,.62);font-size:clamp(.75em,2.8vw,.95em);text-align:center;line-height:2;margin:8px 0 4px;}
#s-btn{padding:14px 54px;font-size:clamp(1em,4vw,1.45em);font-weight:900;
  background:linear-gradient(135deg,#005522,#00cc44);color:#fff;
  border:2px solid rgba(0,200,80,.5);border-radius:58px;cursor:pointer;
  font-family:'Microsoft JhengHei',sans-serif;letter-spacing:.12em;
  animation:btn-glow-g 1.8s ease-in-out infinite;}
#s-dots{display:flex;gap:10px;margin-top:4px;}
#s-dots span{width:8px;height:8px;border-radius:50%;display:inline-block;animation:neon-pulse 1.1s ease-in-out infinite;}

/* Game over */
#go-screen{position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 40%,#001a08 0%,#000508 100%);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:30;gap:6px;color:#fff;}
#go-crown{font-size:2.8em;filter:drop-shadow(0 0 14px #ffd700);animation:go-fade .5s ease-out;}
#go-h2{font-size:2.4em;font-weight:900;color:#ffd700;letter-spacing:.18em;
  text-shadow:0 0 24px #ffaa00;animation:go-fade .5s .1s ease-out both;}
#go-div{width:200px;height:2px;background:linear-gradient(to right,transparent,#00ff88,transparent);margin:6px 0;animation:go-fade .5s .2s ease-out both;}
#go-score{font-size:4.5em;font-weight:900;color:#00ff88;text-shadow:0 0 28px #00cc44;animation:go-fade .5s .3s ease-out both;}
#go-info{font-size:.92em;opacity:.6;animation:go-fade .5s .4s ease-out both;}
#go-btn{margin-top:20px;padding:13px 52px;font-size:1.15em;font-weight:700;
  background:linear-gradient(135deg,#0044ff,#0099ff);color:#fff;
  border:2px solid rgba(80,180,255,.5);border-radius:50px;cursor:pointer;
  font-family:'Microsoft JhengHei',sans-serif;animation:btn-glow-g 1.7s ease-in-out infinite;}
</style>
</head>
<body>
<div id="start-screen">
  <div id="s-ball">🎱</div>
  <h1 id="s-title">撞 球</h1>
  <p id="s-sub">BILLIARDS ARCADE</p>
  <div id="s-info">往母球後方拖曳蓄力，放開出桿<br>將所有彩球打入袋</div>
  <button id="s-btn">開 始 遊 戲</button>
  <div id="s-dots">
    <span style="background:#ff3300;animation-delay:0s"></span>
    <span style="background:#ffd700;animation-delay:.15s"></span>
    <span style="background:#00cc44;animation-delay:.3s"></span>
    <span style="background:#0044ff;animation-delay:.45s"></span>
    <span style="background:#cc00ff;animation-delay:.6s"></span>
  </div>
</div>
<div id="go-screen">
  <div id="go-crown">🏆</div>
  <div id="go-h2">完 成！</div>
  <div id="go-div"></div>
  <div id="go-score"></div>
  <div id="go-info"></div>
  <button id="go-btn">再玩一次</button>
</div>
<div id="hud">
  <div id="hud-label" style="font-size:.78em;color:#aaa;letter-spacing:.1em;">已入袋</div>
  <div id="hud-score">0 / 15</div>
</div>
<div id="power-wrap">
  <div id="power-bar-bg"><div id="power-bar-fill"></div></div>
  <div id="power-lbl">0%</div>
</div>
<div id="hint">往母球後方拖曳蓄力・放開出桿</div>
<div id="msg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────
const TW=1.12, TL=2.24;            // playing area (X, Z)
const RW=0.118, RH=0.058;          // rail width, height
const BR=0.0285;                   // ball radius
const PC_C=0.094, PC_S=0.078;      // pocket radius corner/side
const GRAVITY=-9.8;
const W=()=>window.innerWidth, H=()=>window.innerHeight;

// Pocket positions {x, z, r}
const POCKETS=[
  {x:-(TW/2+PC_C*.4), z:-(TL/2+PC_C*.4), r:PC_C},
  {x:  (TW/2+PC_C*.4),z:-(TL/2+PC_C*.4), r:PC_C},
  {x:-(TW/2+PC_S*.1), z:0,                r:PC_S},
  {x:  (TW/2+PC_S*.1),z:0,                r:PC_S},
  {x:-(TW/2+PC_C*.4), z: (TL/2+PC_C*.4), r:PC_C},
  {x:  (TW/2+PC_C*.4),z: (TL/2+PC_C*.4), r:PC_C},
];

// Ball definitions: {n, col, stripe}
const BDEFS=[
  {n:0,  col:0xffffff,stripe:false},
  {n:1,  col:0xFFD700,stripe:false},
  {n:2,  col:0x1144CC,stripe:false},
  {n:3,  col:0xCC1111,stripe:false},
  {n:4,  col:0x7700BB,stripe:false},
  {n:5,  col:0xFF6600,stripe:false},
  {n:6,  col:0x006622,stripe:false},
  {n:7,  col:0x8B1800,stripe:false},
  {n:8,  col:0x111111,stripe:false},
  {n:9,  col:0xFFD700,stripe:true},
  {n:10, col:0x1144CC,stripe:true},
  {n:11, col:0xCC1111,stripe:true},
  {n:12, col:0x7700BB,stripe:true},
  {n:13, col:0xFF6600,stripe:true},
  {n:14, col:0x006622,stripe:true},
  {n:15, col:0x8B1800,stripe:true},
];

// ── Renderer ────────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080810);
scene.fog=new THREE.FogExp2(0x080810,0.07);

const camera=new THREE.PerspectiveCamera(52,W()/H(),0.01,30);
camera.position.set(0,2.1,1.75);
camera.lookAt(0,0,0);

// ── Lighting ────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff,0.18));
const spot=new THREE.SpotLight(0xfff8e8,3.0,5.5,Math.PI/4,0.28,1);
spot.position.set(0,3.0,0); spot.castShadow=true;
spot.shadow.mapSize.set(2048,2048); spot.shadow.bias=-0.001;
scene.add(spot); scene.add(spot.target);
const blL=new THREE.PointLight(0x0033ff,0.9,3.5);blL.position.set(-1.6,1.3,0);scene.add(blL);
const prR=new THREE.PointLight(0x6600cc,0.7,3.5);prR.position.set( 1.6,1.3,0);scene.add(prR);
const wrmF=new THREE.PointLight(0xff9900,0.4,2.5);wrmF.position.set(0,1.1,1.5);scene.add(wrmF);

// ── Felt texture ────────────────────────────────────────────────
function makeFeltTex(){
  const c=document.createElement('canvas');c.width=c.height=256;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#1b6e2c';ctx.fillRect(0,0,256,256);
  ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=1;
  for(let i=0;i<256;i+=5){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,256);ctx.stroke();}
  for(let i=0;i<256;i+=5){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(256,i);ctx.stroke();}
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(9,18);return t;
}

// ── Table geometry ───────────────────────────────────────────────
const feltMat=new THREE.MeshStandardMaterial({map:makeFeltTex(),roughness:0.92,metalness:0});
const felt=new THREE.Mesh(new THREE.BoxGeometry(TW,0.018,TL),feltMat);
felt.position.y=-0.009; felt.receiveShadow=true; scene.add(felt);

// Felt markings
const markMat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.35});
// Head string
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-TW/2+0.01,0.012,TL/4),new THREE.Vector3(TW/2-0.01,0.012,TL/4)]),markMat));
// Foot spot + head spot
const dotGeo=new THREE.CircleGeometry(0.010,16);
const dotMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.45});
[TL/4,-TL/4,0].forEach(z=>{
  const d=new THREE.Mesh(dotGeo,dotMat.clone());d.rotation.x=-Math.PI/2;d.position.set(0,0.012,z);scene.add(d);
});

// Pocket holes + neon rings
const phMat=new THREE.MeshBasicMaterial({color:0x020208});
const neonPocketMat=new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0.5,side:THREE.DoubleSide});
POCKETS.forEach(({x,z,r})=>{
  const ph=new THREE.Mesh(new THREE.CircleGeometry(r*0.88,24),phMat);
  ph.rotation.x=-Math.PI/2;ph.position.set(x,0.002,z);scene.add(ph);
  const pr=new THREE.Mesh(new THREE.RingGeometry(r*0.84,r*0.97,24),neonPocketMat.clone());
  pr.rotation.x=-Math.PI/2;pr.position.set(x,0.004,z);scene.add(pr);
});

// Rails
const railMat=new THREE.MeshStandardMaterial({color:0x3a1605,roughness:0.65,metalness:0.12});
const neonRailMat=()=>new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0.55,blending:THREE.AdditiveBlending,depthWrite:false});
function addRail(w,h,d,x,z){
  const r=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),railMat);
  r.position.set(x,h/2,z);r.castShadow=true;r.receiveShadow=true;scene.add(r);
  const ne=new THREE.Mesh(new THREE.BoxGeometry(w*0.97,0.005,Math.min(w,d)*0.92),neonRailMat());
  ne.position.set(x,h,z);scene.add(ne);
}
addRail(RW, RH, TL+RW*2, -(TW/2+RW/2), 0);
addRail(RW, RH, TL+RW*2,  (TW/2+RW/2), 0);
addRail(TW+RW*2, RH, RW, 0, -(TL/2+RW/2));
addRail(TW+RW*2, RH, RW, 0,  (TL/2+RW/2));

// Table body + legs
const tbodyMat=new THREE.MeshStandardMaterial({color:0x260e03,roughness:0.75});
const tbody=new THREE.Mesh(new THREE.BoxGeometry(TW+RW*2+0.04,0.22,TL+RW*2+0.04),tbodyMat);
tbody.position.y=-0.12;scene.add(tbody);
const legMat=new THREE.MeshStandardMaterial({color:0x1a0a02,roughness:0.7});
[[-TW/2-0.02,-TL/2-0.02],[TW/2+0.02,-TL/2-0.02],[-TW/2-0.02,TL/2+0.02],[TW/2+0.02,TL/2+0.02]].forEach(([x,z])=>{
  const leg=new THREE.Mesh(new THREE.BoxGeometry(0.065,0.5,0.065),legMat);leg.position.set(x,-0.34,z);scene.add(leg);
});

// Room environment
const roomMat=new THREE.MeshStandardMaterial({color:0x0a0010,roughness:0.9});
const ceiling=new THREE.Mesh(new THREE.PlaneGeometry(8,10),roomMat);
ceiling.rotation.x=Math.PI/2;ceiling.position.y=3.5;scene.add(ceiling);
// Spotlight cone (visual)
const coneGeo=new THREE.CylinderGeometry(0.01,0.8,3.2,24,1,true);
const coneMat=new THREE.MeshBasicMaterial({color:0xfff8e0,transparent:true,opacity:0.04,side:THREE.DoubleSide});
const cone=new THREE.Mesh(coneGeo,coneMat);cone.position.set(0,1.4,0);scene.add(cone);

// ── Ball texture generator ───────────────────────────────────────
function colShift(hex,amt){
  const r=Math.min(255,Math.max(0,((hex>>16)&0xff)+amt));
  const g=Math.min(255,Math.max(0,((hex>>8)&0xff)+amt));
  const b=Math.min(255,Math.max(0,(hex&0xff)+amt));
  return`rgb(${r},${g},${b})`;
}
function makeBallTex(n,col,isStripe){
  const SZ=128,c=document.createElement('canvas');c.width=c.height=SZ;
  const ctx=c.getContext('2d'),R=SZ/2,hx='#'+col.toString(16).padStart(6,'0');
  if(n===0){
    // Cue ball
    const g=ctx.createRadialGradient(44,38,2,R,R,R);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.55,'#f2f2f2');g.addColorStop(1,'#cccccc');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
  } else if(isStripe){
    // White base
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
    // Colored stripe
    ctx.fillStyle=hx;ctx.fillRect(0,SZ*0.34,SZ,SZ*0.32);
    // Clip to circle
    ctx.globalCompositeOperation='destination-in';
    ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='source-over';
    // Number badge
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(R,R,23,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a1a';ctx.font=`bold ${n>9?22:26}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n,R,R+1);
  } else if(n===8){
    ctx.fillStyle='#0d0d0d';ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(R,R,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0d0d0d';ctx.font='bold 26px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('8',R,R+1);
  } else {
    // Solid color
    const g=ctx.createRadialGradient(46,40,2,R,R,R);
    g.addColorStop(0,colShift(col,60));g.addColorStop(0.5,hx);g.addColorStop(1,colShift(col,-50));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(R,R,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.font=`bold ${n>9?22:26}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n,R,R+1);
  }
  // Specular highlight
  const sp=ctx.createRadialGradient(46,40,0,50,44,30);
  sp.addColorStop(0,'rgba(255,255,255,0.55)');sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sp;ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
  return new THREE.CanvasTexture(c);
}

// ── Physics world ────────────────────────────────────────────────
const world=new CANNON.World();
world.gravity.set(0,GRAVITY,0);
world.broadphase=new CANNON.NaiveBroadphase();
world.solver.iterations=12;

const mFelt=new CANNON.Material('felt');
const mBall=new CANNON.Material('ball');
const mRail=new CANNON.Material('rail');
world.addContactMaterial(new CANNON.ContactMaterial(mBall,mBall,{restitution:0.93,friction:0.04}));
world.addContactMaterial(new CANNON.ContactMaterial(mBall,mFelt,{restitution:0.12,friction:0.42}));
world.addContactMaterial(new CANNON.ContactMaterial(mBall,mRail,{restitution:0.62,friction:0.18}));

// Felt body (flat plane)
const feltBody=new CANNON.Body({mass:0,material:mFelt});
feltBody.addShape(new CANNON.Plane());
feltBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0),-Math.PI/2);
world.addBody(feltBody);

// Rail bodies
function addRailBody(hw,hh,hd,x,z){
  const b=new CANNON.Body({mass:0,material:mRail});
  b.addShape(new CANNON.Box(new CANNON.Vec3(hw,hh,hd)));
  b.position.set(x,hh,z);world.addBody(b);
}
addRailBody(RW/2,RH/2,(TL+RW*2)/2, -(TW/2+RW/2),0);
addRailBody(RW/2,RH/2,(TL+RW*2)/2,  (TW/2+RW/2),0);
addRailBody((TW+RW*2)/2,RH/2,RW/2, 0,-(TL/2+RW/2));
addRailBody((TW+RW*2)/2,RH/2,RW/2, 0, (TL/2+RW/2));

// ── Balls ────────────────────────────────────────────────────────
const balls=[]; // {mesh,body,n,pocketed,isCue}

function makeBall(def,x,z){
  const mat=new THREE.MeshStandardMaterial({map:makeBallTex(def.n,def.col,def.stripe),roughness:0.30,metalness:0.06});
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(BR,32,32),mat);
  mesh.castShadow=true;scene.add(mesh);
  const body=new CANNON.Body({mass:0.170,material:mBall,linearDamping:0.38,angularDamping:0.42});
  body.addShape(new CANNON.Sphere(BR));
  body.position.set(x,BR,z);
  world.addBody(body);
  const ball={mesh,body,n:def.n,pocketed:false,isCue:def.n===0};
  balls.push(ball);return ball;
}

// Build rack at foot spot (-TL/4), apex toward player
const FS=-TL/4;                         // foot spot Z
const ROW_DZ= BR*2*Math.sin(Math.PI/3); // ≈ BALL_R√3 per row
const ROW_DX= BR*2;

// 8-ball rack order (apex=1, center=8, varied solid/stripe elsewhere)
const RACK=[1, 9,2, 3,8,10, 11,4,14,12, 5,13,6,15,7];
let ri=0;
for(let row=0;row<5;row++){
  for(let col=0;col<=row;col++){
    const n=RACK[ri++];
    const def=BDEFS.find(d=>d.n===n);
    const x=(col-row/2)*ROW_DX;
    const z=FS-row*ROW_DZ;
    makeBall(def,x,z);
  }
}

// Cue ball at head spot
const cueBall=makeBall(BDEFS[0],0,TL/4);

// ── Aim dots + cue stick ─────────────────────────────────────────
const AIM_N=30;
const aimDots=Array.from({length:AIM_N},(_,i)=>{
  const d=new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.004,BR*0.48-i*0.009),8,8),
    new THREE.MeshBasicMaterial({color:0xffee44,transparent:true,opacity:Math.max(0.04,0.9-i*0.032),depthWrite:false}));
  d.visible=false;scene.add(d);return d;
});

// Ghost cue ball at first collision
const ghostMesh=new THREE.Mesh(new THREE.SphereGeometry(BR,20,20),
  new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.22,depthWrite:false}));
ghostMesh.visible=false;scene.add(ghostMesh);

// Cue stick
const cueGroup=new THREE.Group();
const cueStkMat=new THREE.MeshStandardMaterial({color:0xc8a060,roughness:0.55,metalness:0.1});
const cueTipMat=new THREE.MeshStandardMaterial({color:0x4466bb,roughness:0.7});
const cueBody3=new THREE.Mesh(new THREE.CylinderGeometry(0.005,0.013,0.9,8),cueStkMat);
const cueTip3=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.005,0.06,8),cueTipMat);
cueBody3.position.y=0; cueTip3.position.y=0.48;
cueGroup.add(cueBody3);cueGroup.add(cueTip3);
cueGroup.rotation.x=Math.PI/2; // lay horizontal
cueGroup.visible=false;
scene.add(cueGroup);

// ── Game state ───────────────────────────────────────────────────
let gameActive=false,ballsMoving=false;
let isAiming=false,aimAngle=0,aimPower=0;
let pocketed=0,shots=0,msgTimer=0;
let startTime=0;

const hintEl=document.getElementById('hint');
const msgEl=document.getElementById('msg');
const hudScore=document.getElementById('hud-score');
const pwWrap=document.getElementById('power-wrap');
const pwFill=document.getElementById('power-bar-fill');
const pwLbl=document.getElementById('power-lbl');
const startScreenEl=document.getElementById('start-screen');
const goScreenEl=document.getElementById('go-screen');

function showMsg(txt,col,dur=1.1){msgEl.textContent=txt;msgEl.style.color=col||'#fff';msgEl.style.opacity='1';msgTimer=dur;}
function updateHUD(){hudScore.textContent=`${pocketed} / 15`;}

// ── Audio ────────────────────────────────────────────────────────
let _ac=null;
const ac=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;};
let _mg=null;
const mg=()=>{if(!_mg){_mg=ac().createGain();_mg.gain.value=0.55;_mg.connect(ac().destination);}return _mg;};

function sfx(type,vol=1){
  try{
    const c=ac(),t=c.currentTime,dst=mg();
    const osc=(tp,fr)=>{const o=c.createOscillator();o.type=tp;o.frequency.value=fr;return o;};
    const gn=(v,dur,ti=t)=>{const g=c.createGain();g.gain.setValueAtTime(v,ti);g.gain.exponentialRampToValueAtTime(0.001,ti+dur);return g;};
    const run=(o,g,dur,ti=t)=>{o.connect(g);g.connect(dst);o.start(ti);o.stop(ti+dur);};
    const noise=(dur,fr,q,gv,ti=t)=>{
      const buf=c.createBuffer(1,Math.ceil(c.sampleRate*dur),c.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
      const s=c.createBufferSource();s.buffer=buf;
      const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=fr;f.Q.value=q;
      const g2=c.createGain();g2.gain.setValueAtTime(gv,ti);g2.gain.exponentialRampToValueAtTime(0.001,ti+dur);
      s.connect(f);f.connect(g2);g2.connect(dst);s.start(ti);s.stop(ti+dur);
    };
    if(type==='shoot'){noise(0.09,700,4,0.45);}
    else if(type==='ballhit'){
      const o=osc('sine',750+Math.random()*200);o.frequency.exponentialRampToValueAtTime(280,t+0.07);
      run(o,gn(0.32*vol,0.07),0.07);
    }
    else if(type==='railhit'){
      const o=osc('sine',320);o.frequency.exponentialRampToValueAtTime(140,t+0.10);
      run(o,gn(0.22,0.10),0.10);
    }
    else if(type==='pocket'){
      noise(0.12,400,3,0.28);
      [523,660,784,1047].forEach((fr,i)=>{const ti=t+i*0.065;const o=osc('triangle',fr);run(o,gn(0.12,0.28),0.28,ti);});
    }
    else if(type==='cuefoul'){[392,330,262].forEach((fr,i)=>{const ti=t+i*0.15;const o=osc('sawtooth',fr);run(o,gn(0.16,0.22),0.22,ti);});}
    else if(type==='win'){[523,659,784,1047,1319].forEach((fr,i)=>{const ti=t+i*0.10;const o=osc('triangle',fr);run(o,gn(0.14,0.35),0.35,ti);});}
  }catch(e){}
}

// Background ambient hum
let _bgOn=false;
function startAmbient(){
  if(_bgOn)return;_bgOn=true;
  try{
    const c=ac();
    const o=c.createOscillator();o.type='sine';o.frequency.value=55;
    const g=c.createGain();g.gain.value=0.025;
    const lfo=c.createOscillator();lfo.type='sine';lfo.frequency.value=0.15;
    const lg=c.createGain();lg.gain.value=8;
    lfo.connect(lg);lg.connect(o.frequency);
    o.connect(g);g.connect(mg());
    o.start();lfo.start();
  }catch(e){}
}

// ── Collision sound detection ────────────────────────────────────
let lastVels=new Map();
function detectCollisionSounds(){
  balls.forEach(b=>{
    if(b.pocketed)return;
    const v=b.body.velocity.length();
    const pv=lastVels.get(b.n)||0;
    const dv=pv-v;
    if(dv>0.8&&v<pv*0.85){
      if(Math.random()<0.5) sfx('ballhit',Math.min(1,dv/3));
    }
    lastVels.set(b.n,v);
  });
}

// ── Raycasting helper ────────────────────────────────────────────
const _ray=new THREE.Raycaster();
const _tPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
function pointerToXZ(cx,cy){
  const nx=(cx/W())*2-1,ny=-(cy/H())*2+1;
  _ray.setFromCamera({x:nx,y:ny},camera);
  const pt=new THREE.Vector3();
  _ray.ray.intersectPlane(_tPlane,pt);
  return pt;
}

// ── Aiming ───────────────────────────────────────────────────────
let dragging=false,dragPt=null;

function startAim(cx,cy){
  if(!gameActive||ballsMoving||cueBall.pocketed)return;
  dragging=true;
  dragPt=pointerToXZ(cx,cy);
  updateAimFromPt(dragPt);
  pwWrap.style.display='block';
  cueGroup.visible=true;
}
function moveAim(cx,cy){
  if(!dragging)return;
  dragPt=pointerToXZ(cx,cy);
  updateAimFromPt(dragPt);
}
function updateAimFromPt(pt){
  if(!pt)return;
  const cb=cueBall.body.position;
  // Direction = from touch toward cue ball (pull-back mechanic)
  const dx=cb.x-pt.x, dz=cb.z-pt.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.001)return;
  aimAngle=Math.atan2(dx,dz);
  aimPower=Math.min(1.0,dist*4.5);
  isAiming=true;
  showAimDisplay(dx/dist,dz/dist,cb);
}
function showAimDisplay(nx,nz,cb){
  // Aim dots along travel direction
  const STEP=BR*3.8;
  // Find first collision for ghost
  let hitDist=Infinity,hitNorm={x:0,z:0};
  balls.forEach(b=>{
    if(b.pocketed||b.isCue)return;
    const bx=b.body.position.x,bz=b.body.position.z;
    const fx=bx-cb.x, fz=bz-cb.z;
    const dot=fx*nx+fz*nz;
    if(dot<0)return;
    const cross=fx*nz-fz*nx;
    if(Math.abs(cross)<BR*2){
      const perp=Math.abs(cross),along=Math.sqrt(Math.max(0,BR*2*BR*2-perp*perp));
      const d=dot-along;
      if(d>0&&d<hitDist){hitDist=d;hitNorm={x:bx-cb.x-nx*d,z:bz-cb.z-nz*d};}
    }
  });
  aimDots.forEach((d,i)=>{
    const dist=(i+0.5)*STEP;
    if(dist>hitDist+0.01){d.visible=false;return;}
    d.position.set(cb.x+nx*dist,0.005,cb.z+nz*dist);
    d.visible=true;d.material.opacity=Math.max(0.05,0.88-i*0.030);
  });
  if(hitDist<12){
    ghostMesh.position.set(cb.x+nx*hitDist,BR,cb.z+nz*hitDist);
    ghostMesh.visible=true;
  } else ghostMesh.visible=false;
  // Cue stick position (behind cue ball, pulled back by power)
  const pullBack=0.06+aimPower*0.16;
  const cueX=cb.x-nx*(BR+pullBack+0.5);
  const cueZ=cb.z-nz*(BR+pullBack+0.5);
  cueGroup.position.set(cueX,0.018,cueZ);
  cueGroup.rotation.y=-Math.atan2(nx,nz);
  // Power UI
  pwFill.style.width=(aimPower*100)+'%';
  pwLbl.textContent=Math.round(aimPower*100)+'%';
  pwLbl.style.color=aimPower<0.4?'#00cc44':aimPower<0.75?'#ffcc00':'#ff3300';
}
function endAim(){
  dragging=false;isAiming=false;
  aimDots.forEach(d=>d.visible=false);
  ghostMesh.visible=false;cueGroup.visible=false;
  pwWrap.style.display='none';
}
function shoot(){
  if(!isAiming||aimPower<0.04||cueBall.pocketed)return;
  const PSCALE=6.2;
  const cb=cueBall.body;
  const dx=Math.sin(aimAngle),dz=Math.cos(aimAngle);
  cb.velocity.set(dx*aimPower*PSCALE,0,dz*aimPower*PSCALE);
  cb.angularVelocity.set(0,0,0);
  shots++;ballsMoving=true;
  sfx('shoot');endAim();
}

window.addEventListener('mousedown',e=>{if(e.target.closest('button'))return;startAim(e.clientX,e.clientY);});
window.addEventListener('mousemove',e=>{moveAim(e.clientX,e.clientY);});
window.addEventListener('mouseup',e=>{if(!dragging)return;if(aimPower>0.04)shoot();else endAim();});
window.addEventListener('touchstart',e=>{if(e.target.closest('button'))return;e.preventDefault();startAim(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('touchmove',e=>{e.preventDefault();moveAim(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('touchend',e=>{e.preventDefault();if(!dragging)return;if(aimPower>0.04)shoot();else endAim();},{passive:false});
window.addEventListener('touchcancel',()=>{dragging=false;endAim();});

// ── Pocket detection ─────────────────────────────────────────────
function checkPockets(){
  balls.forEach(b=>{
    if(b.pocketed)return;
    const px=b.body.position.x,pz=b.body.position.z;
    for(const poc of POCKETS){
      const dx=px-poc.x,dz=pz-poc.z;
      if(Math.sqrt(dx*dx+dz*dz)<poc.r){
        b.pocketed=true;b.mesh.visible=false;
        b.body.velocity.set(0,0,0);b.body.angularVelocity.set(0,0,0);
        b.body.position.set(0,-1,0);
        if(b.isCue){sfx('cuefoul');showMsg('母球入洞！重置','#ff6644');}
        else{pocketed++;sfx('pocket');showMsg(`${b.n} 號入洞！`,'#00ff88',0.9);}
        updateHUD();
        if(pocketed>=15) setTimeout(endGame,600);
        break;
      }
    }
  });
}

// ── All balls stopped ────────────────────────────────────────────
function allStopped(){
  return balls.every(b=>{
    if(b.pocketed)return true;
    return b.body.velocity.length()<0.012&&b.body.angularVelocity.length()<0.012;
  });
}

// ── Game flow ────────────────────────────────────────────────────
function resetBalls(){
  // Remove old ball bodies
  balls.forEach(b=>{world.remove(b.body);scene.remove(b.mesh);});
  balls.length=0;
  // Recreate rack
  let ri=0;
  for(let row=0;row<5;row++){
    for(let col=0;col<=row;col++){
      const n=RACK[ri++];
      const def=BDEFS.find(d=>d.n===n);
      makeBall(def,(col-row/2)*ROW_DX,FS-row*ROW_DZ);
    }
  }
  makeBall(BDEFS[0],0,TL/4);
  // rebuild cue ball reference
  Object.assign(cueBall,balls[balls.length-1]);
}

function startGame(){
  ac();startAmbient();
  startScreenEl.classList.add('hidden');
  goScreenEl.style.display='none';
  pocketed=0;shots=0;ballsMoving=false;isAiming=false;
  balls.forEach(b=>{world.remove(b.body);scene.remove(b.mesh);});
  balls.length=0;
  let ri=0;
  for(let row=0;row<5;row++){
    for(let col=0;col<=row;col++){
      const n=RACK[ri++];const def=BDEFS.find(d=>d.n===n);
      makeBall(def,(col-row/2)*ROW_DX,FS-row*ROW_DZ);
    }
  }
  const cb=makeBall(BDEFS[0],0,TL/4);cb.isCue=true;
  // set cueBall reference
  cueBall.mesh=cb.mesh;cueBall.body=cb.body;cueBall.pocketed=false;
  updateHUD();
  gameActive=true;startTime=Date.now();
  hintEl.style.opacity='0.52';
}

function endGame(){
  gameActive=false;sfx('win');
  const sec=Math.round((Date.now()-startTime)/1000);
  const m=Math.floor(sec/60),s=sec%60;
  document.getElementById('go-score').textContent=`${pocketed} 球`;
  document.getElementById('go-info').textContent=`${shots} 桿・用時 ${m}:${String(s).padStart(2,'0')}`;
  goScreenEl.style.display='flex';
}

document.getElementById('s-btn').addEventListener('click',startGame);
document.getElementById('s-btn').addEventListener('touchend',e=>{e.preventDefault();startGame();},{passive:false});
document.getElementById('go-btn').addEventListener('click',()=>{goScreenEl.style.display='none';startScreenEl.classList.remove('hidden');});
document.getElementById('go-btn').addEventListener('touchend',e=>{e.preventDefault();goScreenEl.style.display='none';startScreenEl.classList.remove('hidden');},{passive:false});

// ── Cue ball respawn ─────────────────────────────────────────────
function respawnCueBall(){
  const cb=balls.find(b=>b.isCue);
  if(!cb)return;
  cb.pocketed=false;cb.mesh.visible=true;
  cb.body.position.set(0,BR,TL/4);
  cb.body.velocity.set(0,0,0);cb.body.angularVelocity.set(0,0,0);
}

// ── Main loop ────────────────────────────────────────────────────
const clock=new THREE.Clock();
const STEP=1/60;

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05);

  if(gameActive&&ballsMoving){
    world.step(STEP,dt,3);
    balls.forEach(b=>{
      if(b.pocketed)return;
      b.mesh.position.copy(b.body.position);
      b.mesh.quaternion.copy(b.body.quaternion);
    });
    detectCollisionSounds();
    checkPockets();
    if(allStopped()){
      ballsMoving=false;
      const cb=balls.find(b=>b.isCue);
      if(cb&&cb.pocketed) respawnCueBall();
    }
  }
  if(msgTimer>0){msgTimer-=dt;msgEl.style.opacity=String(Math.max(0,Math.min(1,msgTimer/0.22)));}
  if(isAiming){
    const cb=balls.find(b=>b.isCue);
    if(cb&&dragPt) updateAimFromPt(dragPt);
  }
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H());
});

startScreenEl.classList.remove('hidden');
tick();
</script>
