<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏀 投籃機</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background:#000; overflow:hidden; font-family:'Microsoft JhengHei',sans-serif; }
canvas { display:block; }
#power-wrap {
  position:fixed; left:14px; top:50%; transform:translateY(-50%);
  display:none; flex-direction:column; align-items:center; gap:6px; z-index:15;
}
#power-label { color:#fff; font-size:.78em; font-weight:700; letter-spacing:.06em; text-shadow:0 0 8px #ff8800; }
#power-bar-bg {
  width:26px; height:170px; background:rgba(0,0,0,.65); border:2px solid #555; border-radius:13px;
  position:relative; overflow:hidden;
}
#power-bar-fill {
  position:absolute; bottom:0; left:0; right:0; height:0%; border-radius:0 0 11px 11px;
  background:linear-gradient(to top,#00dd44 0%,#ffcc00 50%,#ff3300 100%);
  transition:height .04s linear;
}
#power-sweet-lo,#power-sweet-hi { position:absolute; left:0; right:0; height:2px; background:rgba(255,255,255,.7); }
#power-sweet-lo { bottom:40%; }
#power-sweet-hi { bottom:66%; }
#power-sweet-zone { position:absolute; left:0; right:0; bottom:40%; height:26%; background:rgba(0,255,100,.15); }
#power-pct { color:#ffcc00; font-size:.88em; font-weight:900; min-width:36px; text-align:center; text-shadow:0 0 6px #ff8800; }
#popup {
  position:fixed; top:32%; left:50%; transform:translate(-50%,-50%);
  font-size:clamp(1.8em,9vw,4.5em); font-weight:900; pointer-events:none;
  text-shadow:0 0 24px currentColor; opacity:0; white-space:nowrap; z-index:10;
}
#hint {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,.55); font-size:.9em; pointer-events:none; text-align:center; z-index:10; line-height:1.55;
}
#gameover {
  position:fixed; inset:0; background:rgba(0,0,0,.90);
  flex-direction:column; align-items:center; justify-content:center;
  color:#fff; display:none; z-index:20;
}
#gameover h2 { font-size:2em; color:#ffd700; text-shadow:0 0 20px #ffd700; margin-bottom:6px; }
#final-score { font-size:4em; font-weight:900; color:#ff6600; text-shadow:0 0 20px #ff6600; }
#final-rate { margin-top:8px; font-size:.95em; opacity:.6; }
#replay-btn {
  margin-top:28px; padding:14px 52px; font-size:1.15em; font-weight:700;
  background:linear-gradient(135deg,#ff6200,#ff9500); color:#fff;
  border:none; border-radius:50px; cursor:pointer; font-family:'Microsoft JhengHei',sans-serif;
  box-shadow:0 4px 20px rgba(255,98,0,.5);
}
</style>
</head>
<body>
<div id="power-wrap">
  <div id="power-label">力道</div>
  <div id="power-bar-bg">
    <div id="power-bar-fill"></div>
    <div id="power-sweet-zone"></div>
    <div id="power-sweet-lo"></div>
    <div id="power-sweet-hi"></div>
  </div>
  <div id="power-pct">0%</div>
</div>
<div id="popup"></div>
<div id="hint">按住蓄力　放開投籃</div>
<div id="gameover">
  <h2>時間到！</h2>
  <div id="final-score"></div>
  <div id="final-rate"></div>
  <button id="replay-btn">再玩一次</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const W = () => window.innerWidth, H = () => window.innerHeight;

const GRAVITY   = -14;
const HOOP_Z    = -2.0;
const HOOP_Y    = 3.4;
const RIM_R     = 0.44;
const RIM_TUBE  = 0.044;
const BALL_R    = 0.23;
const WALL_HW   = 1.55;
const BB_FACE_Z = HOOP_Z - 0.50;
const BALL_HOME = new THREE.Vector3(0, 0.38, 2.0);
const POOL_SIZE = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010c1a);
scene.fog = new THREE.Fog(0x010c1a, 14, 26);

const getFOV = () => W() < H() ? 70 : 52;
const camera = new THREE.PerspectiveCamera(getFOV(), W()/H(), 0.1, 40);
camera.position.set(0, 0.9, 4.2);
camera.lookAt(0, 3.0, -2.0);

scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.0);
sun.position.set(0, 8, 3); sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024); scene.add(sun);
const blueL = new THREE.PointLight(0x1133cc, 1.4, 9); blueL.position.set(-2.5, 3.5, 0); scene.add(blueL);
const blueR = new THREE.PointLight(0x1133cc, 1.4, 9); blueR.position.set( 2.5, 3.5, 0); scene.add(blueR);
const rimLight = new THREE.PointLight(0xff6600, 1.0, 5); rimLight.position.set(0, 5.0, -1.5); scene.add(rimLight);

// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(3.1, 11.0),
  new THREE.MeshStandardMaterial({ color: 0xc07535, roughness: 0.78 }));
floor.rotation.x = -Math.PI/2; floor.position.set(0, 0, -0.5); floor.receiveShadow = true; scene.add(floor);
const flm = new THREE.LineBasicMaterial({ color: 0x8b5020, opacity: 0.35, transparent: true });
[-0.75, 0, 0.75].forEach(x => scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,.01,-5.5),new THREE.Vector3(x,.01,4.5)]), flm)));

// Side walls
const wallMat = new THREE.MeshStandardMaterial({ color: 0x041248, roughness: 0.4, metalness: 0.3 });
[-1.67, 1.67].forEach(x => {
  const w = new THREE.Mesh(new THREE.BoxGeometry(0.24, 5.5, 11.0), wallMat);
  w.position.set(x, 2.75, -0.5); w.castShadow = true; scene.add(w);
});
const trimMat = new THREE.MeshStandardMaterial({ color:0x1a44ee, metalness:0.8, roughness:0.15, emissive:new THREE.Color(0x001477) });
[-1.56, 1.56].forEach(x => {
  const t = new THREE.Mesh(new THREE.BoxGeometry(0.03, 5.5, 11.0), trimMat);
  t.position.set(x, 2.75, -0.5); scene.add(t);
});

// Back wall
const backWallMesh = new THREE.Mesh(new THREE.BoxGeometry(3.4, 5.5, 0.14),
  new THREE.MeshStandardMaterial({ color:0x060f28, roughness:0.9 }));
backWallMesh.position.set(0, 2.75, -3.2); scene.add(backWallMesh);

// Arch + LEDs
const archTopMesh = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.3, 1.0),
  new THREE.MeshStandardMaterial({ color:0x040d24, metalness:0.5, roughness:0.3 }));
archTopMesh.position.set(0, 5.55, -2.0); scene.add(archTopMesh);
const ledMat = new THREE.MeshBasicMaterial({ color:0x22ddff, transparent:true, opacity:0.9 });
const leds = [];
for (let i = 0; i < 15; i++) {
  const led = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), ledMat.clone());
  led.position.set(-1.4+(i/14)*2.8, 5.48, -2.0); scene.add(led); leds.push(led);
}

// Scoreboard
const sbCvs = document.createElement('canvas'); sbCvs.width=512; sbCvs.height=192;
const sbCtx = sbCvs.getContext('2d'), sbTex = new THREE.CanvasTexture(sbCvs);
const sbMesh = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 0.82), new THREE.MeshBasicMaterial({ map:sbTex }));
sbMesh.position.set(0, 4.9, -3.13); scene.add(sbMesh);
function drawBoard(t, sc, hi, active) {
  const ctx=sbCtx, w=512, h=192;
  ctx.fillStyle='#000e20'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#001530';
  for (let x=0;x<w;x+=5) for (let y=0;y<h;y+=5) ctx.fillRect(x,y,2,2);
  ctx.strokeStyle='#002244'; ctx.lineWidth=1;
  [170,342].forEach(x=>{ctx.beginPath();ctx.moveTo(x,8);ctx.lineTo(x,h-8);ctx.stroke();});
  ctx.fillStyle='#7799bb'; ctx.font='bold 19px monospace'; ctx.textAlign='center';
  ctx.fillText('HIGHEST',85,28); ctx.fillText('TIME',256,28); ctx.fillText('SCORE',427,28);
  ctx.font='bold 66px monospace';
  ctx.fillStyle='#ff6600'; ctx.fillText(hi.toString().padStart(3,'0'),85,112);
  ctx.fillStyle=t<=10?'#ff2200':'#ff8800';
  ctx.fillText(Math.ceil(Math.max(0,t)).toString().padStart(2,'0'),256,112);
  ctx.fillStyle='#ff6600'; ctx.fillText(sc.toString().padStart(3,'0'),427,112);
  if (!active){ctx.fillStyle='#ffdd00';ctx.font='bold 26px monospace';ctx.fillText('WELCOME',256,168);}
  sbTex.needsUpdate=true;
}

// Backboard
// ── Hoop group (moves left/right when time < 40) ──
const hoopGroup = new THREE.Group();
scene.add(hoopGroup);

const bbMat = new THREE.MeshStandardMaterial({ color:0xd8eeff, transparent:true, opacity:0.78, roughness:0.05 });
const bb = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.95, 0.05), bbMat);
bb.position.set(0, HOOP_Y+0.52, HOOP_Z-0.52); bb.castShadow=true; hoopGroup.add(bb);
const sq = new THREE.Mesh(new THREE.BoxGeometry(0.52,0.40,0.04),
  new THREE.MeshStandardMaterial({color:0xff3300,transparent:true,opacity:0.5}));
sq.position.set(0, HOOP_Y+0.45, HOOP_Z-0.50); hoopGroup.add(sq);
const metal = new THREE.MeshStandardMaterial({color:0xc8c8c8,metalness:0.9,roughness:0.15});
const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.62,8), metal);
arm.rotation.set(Math.PI/2,0,0); arm.position.set(0,HOOP_Y+0.04,HOOP_Z-0.24); hoopGroup.add(arm);

// Rim
const rimMesh = new THREE.Mesh(new THREE.TorusGeometry(RIM_R,0.032,12,64),
  new THREE.MeshStandardMaterial({color:0xff5500,metalness:0.85,roughness:0.15}));
rimMesh.rotation.x=Math.PI/2; rimMesh.position.set(0,HOOP_Y,HOOP_Z); rimMesh.castShadow=true; hoopGroup.add(rimMesh);

// Net
(function(){
  const segs=12, netH=0.44, topR=RIM_R-0.02, botR=RIM_R*0.25;
  const nm=new THREE.LineBasicMaterial({color:0xffffff,opacity:0.55,transparent:true});
  const v=(a,r,yo)=>new THREE.Vector3(Math.cos(a)*r,HOOP_Y-yo,HOOP_Z+Math.sin(a)*r);
  for (let i=0;i<segs;i++){
    const a=(i/segs)*Math.PI*2, a2=((i+1)/segs)*Math.PI*2;
    hoopGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v(a,topR,0),v(a,botR,netH)]),nm));
    hoopGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v(a2,topR,0),v(a,botR,netH)]),nm));
    hoopGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      v(a,topR*.62+botR*.38,netH*.45),v(a2,topR*.62+botR*.38,netH*.45)]),nm));
  }
})();

// Tray
const tray = new THREE.Mesh(new THREE.BoxGeometry(2.8,0.07,0.9),
  new THREE.MeshStandardMaterial({color:0xc46a20,roughness:0.7}));
tray.position.set(0,0.28,2.3); scene.add(tray);
const trayBallMat = new THREE.MeshStandardMaterial({color:0xff6200,roughness:0.65});
const trayBalls = [-0.72,0,0.72].map(x=>{
  const tb=new THREE.Mesh(new THREE.SphereGeometry(BALL_R*0.88,16,16),trayBallMat.clone());
  tb.position.set(x,0.34,2.35); tb.castShadow=true; scene.add(tb); return tb;
});

// ── Home ball (decorative, always at BALL_HOME) ──
function addSeams(mesh, r) {
  const sm = new THREE.LineBasicMaterial({color:0x2a0800,opacity:0.65,transparent:true});
  [0,1,2].forEach(ai=>{
    const pts=[];
    for(let i=0;i<=40;i++){
      const t=(i/40)*Math.PI*2,c=Math.cos(t)*(r+.001),s=Math.sin(t)*(r+.001);
      if(ai===0) pts.push(new THREE.Vector3(0,c,s));
      else if(ai===1) pts.push(new THREE.Vector3(c,0,s));
      else pts.push(new THREE.Vector3(c,s,0));
    }
    mesh.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),sm));
  });
}
const homeBallMesh = new THREE.Mesh(new THREE.SphereGeometry(BALL_R,32,32),
  new THREE.MeshStandardMaterial({color:0xff6200,roughness:0.60,metalness:0.05}));
homeBallMesh.castShadow=true; addSeams(homeBallMesh, BALL_R); scene.add(homeBallMesh);
const homeBlob = new THREE.Mesh(new THREE.CircleGeometry(0.22,32),
  new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:0.42}));
homeBlob.rotation.x=-Math.PI/2; homeBlob.position.y=0.01; scene.add(homeBlob);

// ── Arc preview dots ──
const ARC_N = 22;
const arcDots = Array.from({length:ARC_N},(_,i)=>{
  const d=new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.020,0.052-i*0.002),6,6),
    new THREE.MeshBasicMaterial({color:0xffdd00,transparent:true,opacity:Math.max(0.06,0.80-i*0.036)}));
  d.visible=false; scene.add(d); return d;
});

// ── Velocity calc ──
const VY_COEFF=18.5, VZ_COEFF=11.0, VX_COEFF=3.5;
function calcVel(power, px) {
  return new THREE.Vector3(px*power*VX_COEFF, power*VY_COEFF, -power*VZ_COEFF);
}
function showArcForPower(power, px) {
  if (power<0.08){hideArc();return;}
  const v=calcVel(power,px), sdt=0.058;
  let x=BALL_HOME.x,y=BALL_HOME.y,z=BALL_HOME.z,vx=v.x,vy=v.y,vz=v.z;
  arcDots.forEach(d=>{
    vy+=GRAVITY*sdt; x+=vx*sdt; y+=vy*sdt; z+=vz*sdt;
    if(y<0.05||z<-5.5){d.visible=false;}else{d.position.set(x,y,z);d.visible=true;}
  });
}
function hideArc(){arcDots.forEach(d=>d.visible=false);}

// ── Power bar ──
const pwWrap=document.getElementById('power-wrap');
const pwFill=document.getElementById('power-bar-fill');
const pwPct =document.getElementById('power-pct');
function updatePowerUI(p){
  pwFill.style.height=(p*100)+'%';
  pwPct.textContent=Math.round(p*100)+'%';
  pwPct.style.color=(p>=0.40&&p<=0.66)?'#00ff88':'#ffcc00';
}

// ── Ball pool ──
function createPoolBall() {
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(BALL_R,24,24),
    new THREE.MeshStandardMaterial({color:0xff6200,roughness:0.60,metalness:0.05}));
  mesh.castShadow=true; mesh.visible=false; addSeams(mesh,BALL_R); scene.add(mesh);
  const blob=new THREE.Mesh(new THREE.CircleGeometry(0.22,16),
    new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:0.5}));
  blob.rotation.x=-Math.PI/2; blob.position.y=0.01; blob.visible=false; scene.add(blob);
  return { mesh, blob, active:false, vel:new THREE.Vector3(),
           scoredThisShot:false, awaitReset:false, resetTimer:0, missShown:false };
}
const pool = Array.from({length:POOL_SIZE}, createPoolBall);

function getFreeBall() {
  let b = pool.find(b=>!b.active);
  if (!b) {
    // Steal the one settling the longest
    let maxT=-1;
    pool.forEach(pb=>{ if(pb.awaitReset&&pb.resetTimer>maxT){maxT=pb.resetTimer;b=pb;} });
    if (!b) b=pool[0];
    b.mesh.visible=false; b.blob.visible=false;
  }
  return b;
}

// ── Game state ──
let scored=0, hiScore=0, shots=0, streak=0;
let gameActive=false, timeLeft=60;
let popTimer=0, bbFlashTimer=0;
const ballHome = BALL_HOME.clone();

let powering=false, pressTimer=0, pressX=0;
const POWER_DURATION=1.1;

const popupEl    = document.getElementById('popup');
const gameoverEl = document.getElementById('gameover');
const hintEl     = document.getElementById('hint');
document.getElementById('replay-btn').addEventListener('click', startGame);
document.getElementById('replay-btn').addEventListener('touchend', e=>{e.preventDefault();startGame();});

function showPopup(txt,col){ popupEl.textContent=txt; popupEl.style.color=col; popupEl.style.opacity='1'; popTimer=1.1; }
function flashRim(col){ rimMesh.material.color.set(col); setTimeout(()=>rimMesh.material.color.set(0xff5500),250); }

// ── Audio System (Web Audio API, fully synthesized — no external files) ──
let _ac=null;
const ac=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;};
let _mGain=null;
const mg=()=>{if(!_mGain){_mGain=ac().createGain();_mGain.gain.value=0.55;_mGain.connect(ac().destination);}return _mGain;};

function sfx(type,vol=1){
  try{
    const c=ac(),t=c.currentTime,dst=mg();
    const osc=(tp,fr)=>{const o=c.createOscillator();o.type=tp;o.frequency.value=fr;return o;};
    const gn=(v,dur,ti=t)=>{const g=c.createGain();g.gain.setValueAtTime(v,ti);g.gain.exponentialRampToValueAtTime(0.001,ti+dur);return g;};
    const run=(o,g,dur,ti=t)=>{o.connect(g);g.connect(dst);o.start(ti);o.stop(ti+dur);};
    const noise=(dur,lo,hi,gv,ti=t)=>{
      const buf=c.createBuffer(1,Math.ceil(c.sampleRate*dur),c.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
      const s=c.createBufferSource();s.buffer=buf;
      const f=c.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(hi,ti);f.frequency.exponentialRampToValueAtTime(lo,ti+dur);f.Q.value=2;
      const g=c.createGain();g.gain.setValueAtTime(gv,ti);g.gain.exponentialRampToValueAtTime(0.001,ti+dur);
      s.connect(f);f.connect(g);g.connect(dst);s.start(ti);s.stop(ti+dur);
    };
    if(type==='shoot'){noise(0.14,300,1600,0.4*vol);}
    else if(type==='bounce'){const o=osc('sine',140);o.frequency.exponentialRampToValueAtTime(42,t+0.1);run(o,gn(0.38*vol,0.1),0.1);}
    else if(type==='rim'){[880,1320,1760].forEach((fr,i)=>{const o=osc('sine',fr);run(o,gn(0.18*vol/(i+1),0.4),0.4);});}
    else if(type==='board'){const o=osc('sine',220);o.frequency.exponentialRampToValueAtTime(65,t+0.12);run(o,gn(0.3*vol,0.12),0.12);}
    else if(type==='score'){
      noise(0.16,3000,8000,0.5);
      [523.25,659.25,783.99].forEach((fr,i)=>{const ti=t+i*0.09;const o=osc('triangle',fr);const g=c.createGain();g.gain.setValueAtTime(0,ti);g.gain.linearRampToValueAtTime(0.22,ti+0.025);g.gain.exponentialRampToValueAtTime(0.001,ti+0.25);run(o,g,0.25,ti);});
    }
    else if(type==='streak'){[523,659,784,1047].forEach((fr,i)=>{const ti=t+i*0.08;const o=osc('square',fr);const g=c.createGain();g.gain.setValueAtTime(0,ti);g.gain.linearRampToValueAtTime(0.18,ti+0.02);g.gain.exponentialRampToValueAtTime(0.001,ti+0.22);run(o,g,0.22,ti);});}
    else if(type==='miss'){const o=osc('sawtooth',370);o.frequency.exponentialRampToValueAtTime(155,t+0.28);run(o,gn(0.18*vol,0.28),0.28);}
    else if(type==='tick'){const o=osc('sine',900);run(o,gn(0.13,0.05),0.05);}
    else if(type==='gameover'){[392,349,311,261].forEach((fr,i)=>{const ti=t+i*0.2;const o=osc('sawtooth',fr);run(o,gn(0.22,0.28),0.28,ti);});}
  }catch(e){}
}

// ── Background Music ──
let _bgOn=false,_bgNext=0,_bgStep=0;
const BG_BPM=124,BG_B=60/BG_BPM;
const BG_BASS=[65.41,65.41,73.42,73.42,55.00,55.00,87.31,98.00];
const BG_MEL =[523.25,659.25,783.99,659.25,392.00,523.25,659.25,587.33];
function _bgTick(){
  if(!_bgOn)return;
  const c=ac(),now=c.currentTime;
  while(_bgNext<now+0.35){
    const t=_bgNext,s=_bgStep%8;
    // Bass
    const bo=c.createOscillator();bo.type='sawtooth';bo.frequency.value=BG_BASS[s];
    const bg=c.createGain();bg.gain.setValueAtTime(0.11,t);bg.gain.exponentialRampToValueAtTime(0.001,t+BG_B*0.75);
    bo.connect(bg);bg.connect(mg());bo.start(t);bo.stop(t+BG_B);
    // Melody (every 2 steps)
    if(s%2===0){
      const mo=c.createOscillator();mo.type='triangle';mo.frequency.value=BG_MEL[s/2]||523;
      const mg2=c.createGain();mg2.gain.setValueAtTime(0,t);mg2.gain.linearRampToValueAtTime(0.07,t+0.03);mg2.gain.exponentialRampToValueAtTime(0.001,t+BG_B*1.9);
      mo.connect(mg2);mg2.connect(mg());mo.start(t);mo.stop(t+BG_B*2);
    }
    // Hi-hat
    const hb=c.createBuffer(1,Math.ceil(c.sampleRate*0.04),c.sampleRate);
    const hd=hb.getChannelData(0);for(let i=0;i<hd.length;i++)hd[i]=(Math.random()*2-1)*(1-i/hd.length);
    const hs=c.createBufferSource();hs.buffer=hb;
    const hf=c.createBiquadFilter();hf.type='highpass';hf.frequency.value=9000;
    const hg=c.createGain();hg.gain.setValueAtTime(0.055,t);hg.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    hs.connect(hf);hf.connect(hg);hg.connect(mg());hs.start(t);hs.stop(t+0.04);
    // Kick (beat 0,4)
    if(s===0||s===4){const ko=c.createOscillator();ko.type='sine';ko.frequency.setValueAtTime(175,t);ko.frequency.exponentialRampToValueAtTime(38,t+0.16);const kg=c.createGain();kg.gain.setValueAtTime(0.28,t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.16);ko.connect(kg);kg.connect(mg());ko.start(t);ko.stop(t+0.16);}
    // Snare (beat 2,6)
    if(s===2||s===6){const sb=c.createBuffer(1,Math.ceil(c.sampleRate*0.12),c.sampleRate);const sd=sb.getChannelData(0);for(let i=0;i<sd.length;i++)sd[i]=(Math.random()*2-1)*(1-i/sd.length);const ss=c.createBufferSource();ss.buffer=sb;const sf=c.createBiquadFilter();sf.type='bandpass';sf.frequency.value=1800;sf.Q.value=1;const sg=c.createGain();sg.gain.setValueAtTime(0.14,t);sg.gain.exponentialRampToValueAtTime(0.001,t+0.12);ss.connect(sf);sf.connect(sg);sg.connect(mg());ss.start(t);ss.stop(t+0.12);}
    _bgNext+=BG_B;_bgStep++;
  }
  setTimeout(_bgTick,80);
}
function startBgMusic(){if(_bgOn)return;_bgOn=true;_bgNext=ac().currentTime+0.1;_bgStep=0;_bgTick();}
function stopBgMusic(){_bgOn=false;}

// ── Controls (no inFlight lock — always allow new shot) ──
function pDown(cx) {
  ac(); // wake AudioContext on first gesture
  if (!gameActive) return;
  powering=true; pressTimer=0;
  pressX=(cx-W()/2)/(W()/2);
  pwWrap.style.display='flex';
  hintEl.style.opacity='0';
}
function pUp() {
  if (!powering) return;
  powering=false; pwWrap.style.display='none'; hideArc();
  if (!gameActive) return;
  const power=Math.min(pressTimer/POWER_DURATION,1.0);
  if (power<0.05) return;
  shots++;
  const b=getFreeBall();
  b.vel.copy(calcVel(power,pressX));
  b.mesh.position.set(ballHome.x, homeBallMesh.position.y, ballHome.z);
  b.blob.position.set(ballHome.x,0.01,ballHome.z);
  b.mesh.visible=true; b.blob.visible=true;
  b.active=true; b.scoredThisShot=false;
  b.awaitReset=false; b.resetTimer=0; b.missShown=false;
  sfx('shoot');
}

window.addEventListener('mousedown',  e=>pDown(e.clientX));
window.addEventListener('mouseup',    pUp);
window.addEventListener('touchstart', e=>{
  if(e.target.closest('#replay-btn,button'))return;
  e.preventDefault(); pDown(e.touches[0].clientX);
},{passive:false});
window.addEventListener('touchend', e=>{
  if(e.target.closest('#replay-btn,button'))return;
  e.preventDefault(); pUp();
},{passive:false});
window.addEventListener('touchcancel', pUp);

// ── Per-ball physics ──
function updateBall(b, dt) {
  if (!b.active) return;
  if (!b.awaitReset) {
    const pz = b.mesh.position.z; // capture before update (for hoop-plane crossing)
    b.vel.y+=GRAVITY*dt;
    b.mesh.position.addScaledVector(b.vel,dt);
    b.mesh.rotation.x+=b.vel.z*dt*3.0;
    b.mesh.rotation.z-=b.vel.x*dt*3.0;

    const {x:bx,y:by,z:bz}=b.mesh.position;

    b.blob.position.set(bx,0.01,bz);
    b.blob.scale.setScalar(Math.max(0.12,1-by*0.10));
    b.blob.material.opacity=Math.max(0.03,0.48-by*0.05);

    // Backboard — very soft (0.20 restitution)
    const hx=hoopGroup.position.x;
    if (b.vel.z<0 && bz-BALL_R<=BB_FACE_Z && bz+BALL_R>BB_FACE_Z-0.08 &&
        Math.abs(bx-hx)<0.88 && by>HOOP_Y-0.15 && by<HOOP_Y+1.05) {
      b.vel.z=Math.abs(b.vel.z)*0.20;
      b.vel.x+=(Math.random()-0.5)*0.25;
      b.vel.y-=0.5;
      b.mesh.position.z=BB_FACE_Z+BALL_R+0.01;
      bbMat.color.set(0xffffff); bbMat.opacity=1.0; bbFlashTimer=0.18;
      sfx('board');
      if (!b.scoredThisShot&&popTimer<=0) showPopup('BOARD!','#88ccff');
    }

    // Back wall — blocks ball from escaping behind backboard
    if (b.mesh.position.z < -3.0 + BALL_R && b.vel.z < 0) {
      b.vel.z = Math.abs(b.vel.z) * 0.15;
      b.vel.x *= 0.85;
      b.mesh.position.z = -3.0 + BALL_R;
    }

    // Rim (torus closest-point) — gate: only near hoop z-range, not front approach zone
    const dxz=Math.sqrt((bx-hx)*(bx-hx)+(bz-HOOP_Z)*(bz-HOOP_Z));
    const dzh=Math.abs(bz-HOOP_Z);
    if (dxz>0.01 && dzh<RIM_R+RIM_TUBE && b.mesh.position.z < HOOP_Z + 0.10) {
      const cpx=(bx-hx)*RIM_R/dxz+hx, cpy=HOOP_Y, cpz=HOOP_Z+(bz-HOOP_Z)*RIM_R/dxz;
      const cd=Math.sqrt((bx-cpx)**2+(by-cpy)**2+(bz-cpz)**2);
      if (cd<BALL_R+RIM_TUBE) {
        const nx=(bx-cpx)/cd, ny=(by-cpy)/cd, nz=(bz-cpz)/cd;
        const dot=b.vel.x*nx+b.vel.y*ny+b.vel.z*nz;
        if (dot<0) {
          const e=0.25; // softer rim
          b.vel.x-=(1+e)*dot*nx; b.vel.y-=(1+e)*dot*ny; b.vel.z-=(1+e)*dot*nz;
          const ov=BALL_R+RIM_TUBE-cd;
          b.mesh.position.x+=nx*ov; b.mesh.position.y+=ny*ov; b.mesh.position.z+=nz*ov;
          flashRim(0xffdd00); sfx('rim');
        }
      }
    }

    // Side walls
    if (Math.abs(b.mesh.position.x)>WALL_HW-BALL_R) {
      b.mesh.position.x=Math.sign(b.mesh.position.x)*(WALL_HW-BALL_R);
      b.vel.x=-b.vel.x*0.40; sfx('bounce',0.25);
    }

    // Ceiling — stops balls flying up out of scene at high power
    if (b.mesh.position.y > 5.2 - BALL_R && b.vel.y > 0) {
      b.vel.y = -b.vel.y * 0.15;
      b.vel.x *= 0.90; b.vel.z *= 0.90;
      b.mesh.position.y = 5.2 - BALL_R;
    }

    // Front wall — highly absorptive
    if (b.mesh.position.z>3.8 && b.vel.z>0) {
      b.vel.z=-b.vel.z*0.10;
      b.vel.x*=0.80;
      b.mesh.position.z=3.8;
    }

    // Floor
    if (b.mesh.position.y<BALL_R) {
      b.mesh.position.y=BALL_R;
      if (Math.abs(b.vel.y)>0.8) {
        b.vel.y=-b.vel.y*0.22; b.vel.x*=0.80; b.vel.z*=0.80; sfx('bounce',0.5);
      } else {
        b.vel.set(0,0,0); b.awaitReset=true; b.resetTimer=0;
      }
    }

    // Out of bounds (should not happen now with back wall + ceiling)
    if (b.mesh.position.y < -1.0) { b.awaitReset=true; b.resetTimer=0; }

    // Z-crossing score: front approach OR backboard bounce-in
    const crossFront = pz > HOOP_Z && b.mesh.position.z <= HOOP_Z;
    const crossBoard = b.vel.z > 0 && pz < HOOP_Z && b.mesh.position.z >= HOOP_Z;
    if (!b.scoredThisShot && b.vel.y < -0.3 && (crossFront || crossBoard)) {
      const fx=b.mesh.position.x, fz=b.mesh.position.z;
      const dxz2=Math.sqrt((fx-hx)*(fx-hx)+(fz-HOOP_Z)*(fz-HOOP_Z));
      const fy=b.mesh.position.y;
      const yFloor = crossBoard ? HOOP_Y-0.6 : HOOP_Y-BALL_R; // lenient for board, strict for front
      if (dxz2 < RIM_R-RIM_TUBE && fy >= yFloor && fy < HOOP_Y+0.8) {
        b.scoredThisShot=true; scored++; streak++;
        if (scored>hiScore) hiScore=scored;
        flashRim(0x00ff88);
        sfx(streak>=3?'streak':'score');
        if (streak>=3) showPopup(`🔥 ${streak}連中！`,'#ff9900');
        else if (streak===2) showPopup('NICE! ×2 🔥','#ffd700');
        else showPopup('NICE! 🏀','#00e5ff');
      }
    }
  }

  // Miss + fade-out
  if (b.awaitReset) {
    if (!b.scoredThisShot && !b.missShown) {
      if (popTimer<=0) { showPopup('MISS','#ff4444'); streak=0; sfx('miss'); }
      b.missShown=true;
    }
    b.resetTimer+=dt;
    if (b.resetTimer>1.2) { b.active=false; b.mesh.visible=false; b.blob.visible=false; }
  }
}

// ── Ball-ball elastic collisions ──
function ballBallCollisions() {
  for (let i=0;i<POOL_SIZE-1;i++) {
    const a=pool[i];
    if (!a.active||a.awaitReset) continue;
    for (let j=i+1;j<POOL_SIZE;j++) {
      const b=pool[j];
      if (!b.active||b.awaitReset) continue;
      const dx=a.mesh.position.x-b.mesh.position.x;
      const dy=a.mesh.position.y-b.mesh.position.y;
      const dz=a.mesh.position.z-b.mesh.position.z;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if (d<2*BALL_R&&d>0.001) {
        const nx=dx/d, ny=dy/d, nz=dz/d;
        const rv=(a.vel.x-b.vel.x)*nx+(a.vel.y-b.vel.y)*ny+(a.vel.z-b.vel.z)*nz;
        if (rv<0) {
          const imp=(1+0.65)*rv/2;
          a.vel.x-=imp*nx; a.vel.y-=imp*ny; a.vel.z-=imp*nz;
          b.vel.x+=imp*nx; b.vel.y+=imp*ny; b.vel.z+=imp*nz;
          const ov=2*BALL_R-d;
          a.mesh.position.x+=nx*ov*.5; a.mesh.position.y+=ny*ov*.5; a.mesh.position.z+=nz*ov*.5;
          b.mesh.position.x-=nx*ov*.5; b.mesh.position.y-=ny*ov*.5; b.mesh.position.z-=nz*ov*.5;
        }
      }
    }
  }
}

// ── Game flow ──
let _tickSec=-1;
function startGame() {
  scored=0; shots=0; streak=0; timeLeft=60; gameActive=true; _tickSec=-1;
  powering=false; pressTimer=0; pwWrap.style.display='none';
  pool.forEach(b=>{b.active=false;b.mesh.visible=false;b.blob.visible=false;});
  ballHome.copy(BALL_HOME);
  gameoverEl.style.display='none';
  hintEl.style.opacity='.6';
  trayBalls.forEach((tb,i)=>{tb.visible=true;tb.position.set((i-1)*0.72,0.34,2.35);});
  hideArc();
  hoopGroup.position.x = 0; rimLight.position.x = 0;
  startBgMusic();
}
function endGame() {
  gameActive=false; powering=false;
  stopBgMusic(); sfx('gameover');
  pwWrap.style.display='none'; hideArc();
  pool.forEach(b=>{b.active=false;b.mesh.visible=false;b.blob.visible=false;});
  const rate=shots>0?Math.round(scored/shots*100):0;
  document.getElementById('final-score').textContent=`${scored} 分`;
  document.getElementById('final-rate').textContent=`投 ${shots} 球・命中率 ${rate}%`;
  gameoverEl.style.display='flex';
}

// ── Main loop ──
const clock = new THREE.Clock();
let ledT = 0;

function tick() {
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05);

  if (gameActive){timeLeft-=dt;if(timeLeft<=0){timeLeft=0;endGame();}}

  ledT+=dt;
  if (gameActive&&timeLeft<=10) {
    const blink=Math.sin(ledT*9)>0;
    leds.forEach(l=>{l.material.opacity=blink?0.95:0.15;l.material.needsUpdate=true;});
    const sec=Math.ceil(timeLeft); if(sec!==_tickSec&&sec>0){_tickSec=sec;sfx('tick');}
  }
  if (bbFlashTimer>0){bbFlashTimer-=dt;if(bbFlashTimer<=0){bbMat.color.set(0xd8eeff);bbMat.opacity=0.78;}}

  // Power charge
  if (powering&&gameActive) {
    pressTimer+=dt;
    const power=Math.min(pressTimer/POWER_DURATION,1.0);
    updatePowerUI(power); showArcForPower(power,pressX);
    homeBallMesh.scale.setScalar(1+0.04*Math.sin(ledT*18));
  } else { homeBallMesh.scale.setScalar(1); }

  // Home ball idle float
  const et=clock.getElapsedTime();
  homeBallMesh.position.set(ballHome.x, ballHome.y+Math.sin(et*2.2)*0.03, ballHome.z);
  homeBlob.position.set(ballHome.x,0.01,ballHome.z);

  // Hoop left/right movement when timeLeft <= 40
  if (gameActive && timeLeft <= 40 && timeLeft > 0) {
    const prog = Math.min(1, (40 - timeLeft) / 30); // 0→1 over 30s
    const amp  = 0.45 + prog * 0.65; // 0.45 → 1.1 (within WALL_HW-RIM_R)
    const spd  = 1.1 + prog * 1.4;   // 1.1 → 2.5 rad/s
    hoopGroup.position.x = Math.sin(et * spd) * amp;
    rimLight.position.x = hoopGroup.position.x;
  } else {
    hoopGroup.position.x = 0;
    rimLight.position.x = 0;
  }

  // Pool balls
  pool.forEach(b=>updateBall(b,dt));
  ballBallCollisions();

  if (popTimer>0){popTimer-=dt;popupEl.style.opacity=String(Math.max(0,Math.min(1,popTimer/0.25)));}

  drawBoard(timeLeft,scored,hiScore,gameActive);
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.fov=getFOV(); camera.aspect=W()/H();
  camera.updateProjectionMatrix(); renderer.setSize(W(),H());
});

startGame();
tick();
</script>
