<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏀 投籃機</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background:#000; overflow:hidden; font-family:'Microsoft JhengHei',sans-serif; }
canvas { display:block; }
#popup {
  position:fixed; top:32%; left:50%; transform:translate(-50%,-50%);
  font-size:clamp(1.8em,9vw,4.5em); font-weight:900; pointer-events:none;
  text-shadow:0 0 24px currentColor; opacity:0; white-space:nowrap; z-index:10;
}
#hint {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,.55); font-size:.88em; pointer-events:none; text-align:center; z-index:10;
}
#gameover {
  position:fixed; inset:0; background:rgba(0,0,0,.90);
  flex-direction:column; align-items:center; justify-content:center;
  color:#fff; display:none; z-index:20;
}
#gameover h2 { font-size:2em; color:#ffd700; text-shadow:0 0 20px #ffd700; margin-bottom:6px; }
#final-score { font-size:4em; font-weight:900; color:#ff6600; text-shadow:0 0 20px #ff6600; }
#final-rate { margin-top:8px; font-size:.95em; opacity:.6; }
#replay-btn {
  margin-top:28px; padding:14px 52px; font-size:1.15em; font-weight:700;
  background:linear-gradient(135deg,#ff6200,#ff9500); color:#fff;
  border:none; border-radius:50px; cursor:pointer;
  font-family:'Microsoft JhengHei',sans-serif;
  box-shadow:0 4px 20px rgba(255,98,0,.5);
}
</style>
</head>
<body>
<div id="popup"></div>
<div id="hint">向上滑動投籃</div>
<div id="gameover">
  <h2>時間到！</h2>
  <div id="final-score"></div>
  <div id="final-rate"></div>
  <button id="replay-btn">再玩一次</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const W=()=>window.innerWidth, H=()=>window.innerHeight;

// ── Constants ──
const GRAVITY   = -14;
const HOOP_Z    = -2.0;   // hoop distance from viewer
const HOOP_Y    = 3.4;    // hoop height
const RIM_R     = 0.44;   // rim radius
const BALL_R    = 0.23;   // ball radius
const WALL_HW   = 1.55;   // machine half-width (inner)
const BALL_HOME = new THREE.Vector3(0, 0.38, 2.0);

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010c1a);
scene.fog = new THREE.Fog(0x010c1a, 14, 26);

// ── Camera — FRONT VIEW (player's eye looking into machine) ──
const getFOV = () => W() < H() ? 66 : 50;
const camera = new THREE.PerspectiveCamera(getFOV(), W()/H(), 0.1, 40);
camera.position.set(0, 2.0, 5.8);
camera.lookAt(0, 3.6, -1.8);

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.0);
sun.position.set(0, 8, 3); sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);
const blueL = new THREE.PointLight(0x1133cc, 1.4, 9);
blueL.position.set(-2.5, 3.5, 0); scene.add(blueL);
const blueR = new THREE.PointLight(0x1133cc, 1.4, 9);
blueR.position.set(2.5, 3.5, 0); scene.add(blueR);
const rimLight = new THREE.PointLight(0xff6600, 1.0, 5);
rimLight.position.set(0, 5.0, -1.5); scene.add(rimLight);

// ── Floor (wood) ── extends from back to viewer
const floorGeo = new THREE.PlaneGeometry(3.1, 11.0);
const floorMat = new THREE.MeshStandardMaterial({ color: 0xc07535, roughness: 0.78 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.set(0, 0, -0.5); // centered between z=-6 and z=5
floor.receiveShadow = true;
scene.add(floor);
// Wood grain lines
const flm = new THREE.LineBasicMaterial({ color: 0x8b5020, opacity: 0.35, transparent: true });
[-0.75, 0, 0.75].forEach(x => scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x, 0.01, -5.5), new THREE.Vector3(x, 0.01, 4.5)]),
  flm
)));

// ── Side walls (blue cabinet) ── extend full depth
const wallMat = new THREE.MeshStandardMaterial({ color: 0x041248, roughness: 0.4, metalness: 0.3 });
const wallL = new THREE.Mesh(new THREE.BoxGeometry(0.24, 5.5, 11.0), wallMat);
wallL.position.set(-1.67, 2.75, -0.5); wallL.castShadow = true; scene.add(wallL);
const wallR = new THREE.Mesh(new THREE.BoxGeometry(0.24, 5.5, 11.0), wallMat);
wallR.position.set(1.67, 2.75, -0.5); wallR.castShadow = true; scene.add(wallR);
// Glowing trim strips
const trimMat = new THREE.MeshStandardMaterial({
  color: 0x1a44ee, metalness: 0.8, roughness: 0.15,
  emissive: new THREE.Color(0x001477)
});
[-1.56, 1.56].forEach(x => {
  const t = new THREE.Mesh(new THREE.BoxGeometry(0.03, 5.5, 11.0), trimMat);
  t.position.set(x, 2.75, -0.5); scene.add(t);
});

// ── Back wall ──
const backWall = new THREE.Mesh(
  new THREE.BoxGeometry(3.4, 5.5, 0.14),
  new THREE.MeshStandardMaterial({ color: 0x060f28, roughness: 0.9 })
);
backWall.position.set(0, 2.75, -3.2); scene.add(backWall);

// ── Top arch with LED dots ──
const archMat = new THREE.MeshStandardMaterial({ color: 0x040d24, metalness: 0.5, roughness: 0.3 });
const archTop = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.3, 1.0), archMat);
archTop.position.set(0, 5.55, -2.0); scene.add(archTop);
const ledMat = new THREE.MeshBasicMaterial({ color: 0x22ddff, transparent: true, opacity: 0.9 });
const leds = [];
for (let i = 0; i < 15; i++) {
  const led = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), ledMat.clone());
  led.position.set(-1.4 + (i/14)*2.8, 5.48, -2.0);
  scene.add(led); leds.push(led);
}

// ── Scoreboard (canvas texture) ──
const sbCvs = document.createElement('canvas');
sbCvs.width = 512; sbCvs.height = 192;
const sbCtx = sbCvs.getContext('2d');
const sbTex = new THREE.CanvasTexture(sbCvs);
const sbMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(2.2, 0.82),
  new THREE.MeshBasicMaterial({ map: sbTex })
);
sbMesh.position.set(0, 4.9, -3.13);
scene.add(sbMesh);

function drawBoard(t, sc, hi, active) {
  const ctx = sbCtx, w = 512, h = 192;
  ctx.fillStyle = '#000e20'; ctx.fillRect(0, 0, w, h);
  // Dot matrix background
  ctx.fillStyle = '#001530';
  for (let x = 0; x < w; x += 5) for (let y = 0; y < h; y += 5) ctx.fillRect(x, y, 2, 2);
  // Dividers
  ctx.strokeStyle = '#002244'; ctx.lineWidth = 1;
  [170, 342].forEach(x => { ctx.beginPath(); ctx.moveTo(x,8); ctx.lineTo(x,h-8); ctx.stroke(); });
  // Labels
  ctx.fillStyle = '#7799bb'; ctx.font = 'bold 19px monospace'; ctx.textAlign = 'center';
  ctx.fillText('HIGHEST', 85, 28); ctx.fillText('TIME', 256, 28); ctx.fillText('SCORE', 427, 28);
  // Values
  ctx.font = 'bold 66px monospace';
  ctx.fillStyle = '#ff6600'; ctx.fillText(hi.toString().padStart(3,'0'), 85, 112);
  ctx.fillStyle = t <= 10 ? '#ff2200' : '#ff8800';
  ctx.fillText(Math.ceil(Math.max(0, t)).toString().padStart(2,'0'), 256, 112);
  ctx.fillStyle = '#ff6600'; ctx.fillText(sc.toString().padStart(3,'0'), 427, 112);
  if (!active) {
    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 26px monospace';
    ctx.fillText('WELCOME', 256, 168);
  }
  sbTex.needsUpdate = true;
}

// ── Backboard ──
const bbMat = new THREE.MeshStandardMaterial({
  color: 0xd8eeff, transparent: true, opacity: 0.78, roughness: 0.05
});
const bb = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.95, 0.05), bbMat);
bb.position.set(0, HOOP_Y + 0.52, HOOP_Z - 0.52);
bb.castShadow = true; scene.add(bb);
// Red square target on backboard
const sq = new THREE.Mesh(
  new THREE.BoxGeometry(0.52, 0.40, 0.04),
  new THREE.MeshStandardMaterial({ color: 0xff3300, transparent: true, opacity: 0.5 })
);
sq.position.set(0, HOOP_Y + 0.45, HOOP_Z - 0.50); scene.add(sq);
// Support arm
const metal = new THREE.MeshStandardMaterial({ color: 0xc8c8c8, metalness: 0.9, roughness: 0.15 });
const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.62, 8), metal);
arm.rotation.set(Math.PI/2, 0, 0);
arm.position.set(0, HOOP_Y + 0.04, HOOP_Z - 0.24); scene.add(arm);

// ── Rim ──
const rimMesh = new THREE.Mesh(
  new THREE.TorusGeometry(RIM_R, 0.032, 12, 64),
  new THREE.MeshStandardMaterial({ color: 0xff5500, metalness: 0.85, roughness: 0.15 })
);
rimMesh.rotation.x = Math.PI/2;
rimMesh.position.set(0, HOOP_Y, HOOP_Z);
rimMesh.castShadow = true; scene.add(rimMesh);

// ── Net ──
(function() {
  const segs = 12, netH = 0.44, topR = RIM_R - 0.02, botR = RIM_R * 0.25;
  const nm = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.55, transparent: true });
  const v = (a, r, yo) => new THREE.Vector3(
    Math.cos(a)*r, HOOP_Y - yo, HOOP_Z + Math.sin(a)*r
  );
  for (let i = 0; i < segs; i++) {
    const a = (i/segs)*Math.PI*2, a2 = ((i+1)/segs)*Math.PI*2;
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v(a,topR,0), v(a,botR,netH)]), nm));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v(a2,topR,0), v(a,botR,netH)]), nm));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      v(a, topR*.62+botR*.38, netH*.45), v(a2, topR*.62+botR*.38, netH*.45)
    ]), nm));
  }
})();

// ── Main ball ──
const ballMat = new THREE.MeshStandardMaterial({ color: 0xff6200, roughness: 0.60, metalness: 0.05 });
const ball = new THREE.Mesh(new THREE.SphereGeometry(BALL_R, 32, 32), ballMat);
ball.castShadow = true;
// Seams
const seamMat = new THREE.LineBasicMaterial({ color: 0x2a0800, opacity: 0.65, transparent: true });
[[0],[1],[2]].forEach(([ai]) => {
  const pts = [];
  for (let i = 0; i <= 48; i++) {
    const t = (i/48)*Math.PI*2, c = Math.cos(t)*(BALL_R+.002), s = Math.sin(t)*(BALL_R+.002);
    if (ai===0) pts.push(new THREE.Vector3(0,c,s));
    else if (ai===1) pts.push(new THREE.Vector3(c,0,s));
    else pts.push(new THREE.Vector3(c,s,0));
  }
  ball.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), seamMat));
});
scene.add(ball);

// ── Tray + waiting balls ──
const tray = new THREE.Mesh(
  new THREE.BoxGeometry(2.8, 0.07, 0.9),
  new THREE.MeshStandardMaterial({ color: 0xc46a20, roughness: 0.7 })
);
tray.position.set(0, 0.28, 2.3); scene.add(tray);
const trayMat = new THREE.MeshStandardMaterial({ color: 0xff6200, roughness: 0.65 });
const trayBalls = [-0.72, 0, 0.72].map(x => {
  const tb = new THREE.Mesh(new THREE.SphereGeometry(BALL_R*0.88, 16, 16), trayMat.clone());
  tb.position.set(x, 0.34, 2.35); tb.castShadow = true; scene.add(tb); return tb;
});

// ── Shadow blob ──
const blob = new THREE.Mesh(
  new THREE.CircleGeometry(0.22, 32),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.5 })
);
blob.rotation.x = -Math.PI/2; blob.position.y = 0.01; scene.add(blob);

// ── Trajectory arc dots ──
const ARC_N = 18;
const arcDots = Array.from({ length: ARC_N }, (_, i) => {
  const d = new THREE.Mesh(
    new THREE.SphereGeometry(Math.max(0.022, 0.055 - i*0.002), 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true, opacity: Math.max(0.07, 0.82 - i*0.044) })
  );
  d.visible = false; scene.add(d); return d;
});

function showArc(dx, dy) {
  const nUp = -dy / H();
  if (nUp < 0.025) { hideArc(); return; }
  const vx0 = (dx/H())*15, vy0 = nUp*36, vz0 = -nUp*40;
  const sdt = 0.055;
  let px=ballHome.x, py=ballHome.y, pz=ballHome.z, vx=vx0, vy=vy0, vz=vz0;
  arcDots.forEach(d => {
    vy += GRAVITY * sdt; px += vx*sdt; py += vy*sdt; pz += vz*sdt;
    if (py < 0.05 || pz < -5) { d.visible = false; }
    else { d.position.set(px, py, pz); d.visible = true; }
  });
}
function hideArc() { arcDots.forEach(d => d.visible = false); }

// ── Game state ──
let scored=0, hiScore=0, shots=0, streak=0;
let inFlight=false, scoredThisShot=false;
let gameActive=false, timeLeft=60;
let vel = new THREE.Vector3();
let popTimer=0, resetTimer=0, awaitReset=false;
let drag=false, dsx=0, dsy=0;
let ballHome = BALL_HOME.clone();
let bbFlashTimer = 0;

const popupEl = document.getElementById('popup');
const gameoverEl = document.getElementById('gameover');
const hintEl = document.getElementById('hint');
document.getElementById('replay-btn').addEventListener('click', startGame);

function showPopup(txt, col) {
  popupEl.textContent = txt; popupEl.style.color = col;
  popupEl.style.opacity = '1'; popTimer = 1.1;
}
function flashRim(col) {
  rimMesh.material.color.set(col);
  setTimeout(() => rimMesh.material.color.set(0xff5500), 250);
}
function flashBB() {
  bbMat.color.set(0xffffff); bbMat.opacity = 1.0;
  bbFlashTimer = 0.18;
}

// ── Controls ──
function pDown(cx, cy) { if (!gameActive || inFlight) return; drag=true; dsx=cx; dsy=cy; }
function pMove(cx, cy) { if (drag) showArc(cx-dsx, cy-dsy); }
function pUp(cx, cy) {
  if (!drag) return; drag=false; hideArc();
  const dx=cx-dsx, dy=cy-dsy, nUp=-dy/H();
  if (nUp < 0.028 || inFlight || !gameActive) return;
  shots++;
  vel.set((dx/H())*15, nUp*36, -nUp*40);
  ball.position.copy(ballHome);
  inFlight=true; scoredThisShot=false; awaitReset=false;
  hintEl.style.opacity = '0';
}
window.addEventListener('mousedown',  e => pDown(e.clientX, e.clientY));
window.addEventListener('mousemove',  e => pMove(e.clientX, e.clientY));
window.addEventListener('mouseup',    e => pUp(e.clientX, e.clientY));
window.addEventListener('touchstart', e => { e.preventDefault(); pDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
window.addEventListener('touchmove',  e => { e.preventDefault(); pMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
window.addEventListener('touchend',   e => { e.preventDefault(); pUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, {passive:false});

// ── Score detection (clean through the hoop) ──
function checkScore() {
  const {x:bx, y:by, z:bz} = ball.position;
  if (vel.y < 0 && Math.abs(by - HOOP_Y) < 0.30) {
    const hd = Math.sqrt(bx*bx + (bz-HOOP_Z)*(bz-HOOP_Z));
    if (hd < RIM_R - 0.08 && !scoredThisShot) {
      scoredThisShot = true; scored++; streak++;
      if (scored > hiScore) hiScore = scored;
      flashRim(0x00ff88);
      if (streak >= 3) showPopup(`🔥 ${streak}連中！`, '#ff9900');
      else if (streak === 2) showPopup('NICE! ×2 🔥', '#ffd700');
      else showPopup('NICE! 🏀', '#00e5ff');
    }
  }
}

// ── Game flow ──
function startGame() {
  scored=0; shots=0; streak=0;
  inFlight=false; scoredThisShot=false; awaitReset=false;
  timeLeft=60; gameActive=true;
  vel.set(0,0,0);
  ballHome.copy(BALL_HOME);
  ball.position.copy(ballHome);
  gameoverEl.style.display = 'none';
  hintEl.style.opacity = '.5';
  trayBalls.forEach((tb, i) => {
    tb.visible = true;
    tb.position.set((i-1)*0.72, 0.34, 2.35);
  });
  hideArc();
}
function endGame() {
  gameActive = false;
  const rate = shots > 0 ? Math.round(scored/shots*100) : 0;
  document.getElementById('final-score').textContent = `${scored} 分`;
  document.getElementById('final-rate').textContent = `投 ${shots} 球・命中率 ${rate}%`;
  gameoverEl.style.display = 'flex';
}

// ── Physics constants ──
const BB_FACE_Z = HOOP_Z - 0.50;  // front face of backboard
const RIM_TUBE  = 0.044;           // rim tube radius

// ── Main loop ──
const clock = new THREE.Clock();
let ledT = 0;

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameActive) { timeLeft -= dt; if (timeLeft <= 0) { timeLeft = 0; endGame(); } }

  // LED blink when time low
  ledT += dt;
  if (gameActive && timeLeft <= 10) {
    const blink = Math.sin(ledT * 9) > 0;
    leds.forEach(l => { l.material.opacity = blink ? 0.95 : 0.15; l.material.needsUpdate = true; });
  }

  // Backboard flash decay
  if (bbFlashTimer > 0) {
    bbFlashTimer -= dt;
    if (bbFlashTimer <= 0) {
      bbMat.color.set(0xd8eeff); bbMat.opacity = 0.78;
    }
  }

  if (inFlight) {
    // ── Gravity ──
    vel.y += GRAVITY * dt;
    ball.position.addScaledVector(vel, dt);
    // Ball spin
    ball.rotation.x += vel.z * dt * 3.0;
    ball.rotation.z -= vel.x * dt * 3.0;

    // Shadow blob
    const bh = ball.position.y;
    blob.position.set(ball.position.x, 0.01, ball.position.z);
    blob.scale.setScalar(Math.max(0.12, 1 - bh * 0.10));
    blob.material.opacity = Math.max(0.03, 0.48 - bh * 0.05);

    // ── Score check ──
    checkScore();

    // ── Backboard collision ──
    if (vel.z < 0 &&
        ball.position.z - BALL_R <= BB_FACE_Z &&
        ball.position.z + BALL_R  > BB_FACE_Z - 0.08 &&
        Math.abs(ball.position.x)  < 0.88 &&
        ball.position.y > HOOP_Y - 0.15 &&
        ball.position.y < HOOP_Y + 1.05) {
      vel.z = -vel.z * 0.50;
      vel.x += (Math.random() - 0.5) * 0.5;
      vel.y -= 0.5;
      ball.position.z = BB_FACE_Z + BALL_R + 0.01;
      flashBB();
      if (!scoredThisShot) showPopup('BOARD!', '#88ccff');
    }

    // ── Rim collision (torus physics) ──
    {
      const bxr=ball.position.x, byr=ball.position.y, bzr=ball.position.z;
      const dxz = Math.sqrt(bxr*bxr + (bzr-HOOP_Z)*(bzr-HOOP_Z));
      if (dxz > 0.01) {
        const cpx = bxr * RIM_R / dxz;
        const cpy = HOOP_Y;
        const cpz = HOOP_Z + (bzr-HOOP_Z) * RIM_R / dxz;
        const cd  = Math.sqrt((bxr-cpx)**2 + (byr-cpy)**2 + (bzr-cpz)**2);
        if (cd < BALL_R + RIM_TUBE) {
          const nx=(bxr-cpx)/cd, ny=(byr-cpy)/cd, nz=(bzr-cpz)/cd;
          const dot = vel.x*nx + vel.y*ny + vel.z*nz;
          if (dot < 0) {
            const e = 0.38;
            vel.x -= (1+e)*dot*nx;
            vel.y -= (1+e)*dot*ny;
            vel.z -= (1+e)*dot*nz;
            // Push ball out of rim
            const overlap = BALL_R + RIM_TUBE - cd;
            ball.position.x += nx * overlap;
            ball.position.y += ny * overlap;
            ball.position.z += nz * overlap;
            flashRim(0xffdd00);
          }
        }
      }
    }

    // ── Side wall collision ──
    if (Math.abs(ball.position.x) > WALL_HW - BALL_R) {
      ball.position.x = Math.sign(ball.position.x) * (WALL_HW - BALL_R);
      vel.x = -vel.x * 0.40;
    }

    // ── Floor collision ──
    if (ball.position.y < BALL_R) {
      ball.position.y = BALL_R;
      if (Math.abs(vel.y) > 0.8) {
        vel.y = -vel.y * 0.30;
        vel.x *= 0.85;
        vel.z *= 0.85;
      } else {
        vel.set(0,0,0);
        if (!awaitReset) { awaitReset = true; resetTimer = 0; }
      }
    }

    // ── Out-of-bounds reset ──
    if (!awaitReset && (ball.position.z < -6.0 || ball.position.z > 7.0)) {
      awaitReset = true; resetTimer = 0;
    }
    if (!awaitReset && ball.position.y < -0.5) {
      awaitReset = true; resetTimer = 0;
    }
    if (awaitReset && !scoredThisShot && popTimer <= 0) {
      showPopup('MISS', '#ff4444');
      streak = 0;
    }
    if (awaitReset) {
      resetTimer += dt;
      if (resetTimer > 0.6) {
        inFlight=false; awaitReset=false; scoredThisShot=false;
        vel.set(0,0,0);
        ballHome.x = (Math.random() - 0.5) * 0.42;
        ball.position.copy(ballHome);
        trayBalls.forEach((tb, i) => tb.position.set((i-1)*0.72 + ballHome.x*0.15, 0.34, 2.35));
      }
    }

  } else {
    // Idle float
    const t = clock.getElapsedTime();
    ball.position.set(ballHome.x, ballHome.y + Math.sin(t*2.2)*0.03, ballHome.z);
    blob.position.set(ballHome.x, 0.01, ballHome.z);
    blob.scale.setScalar(1); blob.material.opacity = 0.42;
  }

  if (popTimer > 0) {
    popTimer -= dt;
    popupEl.style.opacity = String(Math.max(0, Math.min(1, popTimer / 0.25)));
  }

  drawBoard(timeLeft, scored, hiScore, gameActive);
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.fov = getFOV(); camera.aspect = W()/H();
  camera.updateProjectionMatrix(); renderer.setSize(W(), H());
});

startGame();
tick();
</script>
</body>
</html>
